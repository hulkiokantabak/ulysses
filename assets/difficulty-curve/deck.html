<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Difficulty Curve — the deck</title>
<style>
  /* Dimension 11's presentation register: the audience deck, rebuilt to THE VITRINE
     (ratified 19 July 2026). Each card is one object under one light. The subject is
     drawn, the room is a trace, and gold is the light — used ONCE per plate.

     The constants, identical across the five decks:
       viewBox 0 0 1120 630 — 16:9, one unit = one CSS pixel at design width
       margins l/r 64, top 48, bottom 64; live area 992 x 518
       bands: register 48-90 (baseline 78) · title 90-160 (baseline 140)
              stage 160-552 · foot 552-590 (baseline 580)
       the register hairline at y=100, x 64 -> 1056
       the lifted plate rect (no border) and the dimension badge, bottom right
       five type sizes: datum 96 · title 44 · label 26 · register 24 · note 22
       three stroke weights: hair 1.5 · draw 4 · bear 10 — gold is never a hairline
       five tones; marks ambient r=5, lit r=14; solid = present, ring = unverified
       ONE gold element per plate

     Plate type is chosen by magnitude, and no two FIELDs run consecutively:
       1 SINGULAR · 2 FIELD · 3 SINGULAR · 4 SERIES · 5 PAIR · 6 SERIES · 7 FIELD
       8 SERIES · 9 FIELD · 10 PAIR · 11 SERIES · 12 FIELD · 13 SERIES · 14 SERIES
       15 PAIR · 16 FIELD

     C-19 holds: cards carry identity labels — a name, a count, a page, a date — and
     never the argument. No animation, so prefers-reduced-motion is honoured by
     construction; the state changes are instantaneous and carry no transition. */
  :root {
    --deep:#081a35;   /* the room behind the plate */
    --plate:#0b2140;  /* the plate surface */
    --paper:#f4efe2;  /* subject        13.90:1 on plate */
    --gold:#dfa93f;   /* accent          7.57:1 on plate */
    --mute:#b9c3d6;   /* ambient         8.98:1 on plate at full opacity;
                         3.70:1 composited at .55 — marks and rules only, never text */
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
  }
  *,*::before,*::after { box-sizing:border-box; }
  html,body { margin:0; padding:0; height:100%; background:var(--deep); color:var(--paper); }
  body { font-family:var(--serif); display:flex; flex-direction:column; min-height:100vh; }
  /* 76rem less 2 x 3rem padding = 1120px: one viewBox unit is one CSS pixel at design width */
  .deck { flex:1; display:flex; flex-direction:column; max-width:76rem; width:100%;
          margin-inline:auto; padding:1rem 0 0; padding-inline:3rem; }
  .stage { position:relative; flex:1; display:flex; align-items:center; justify-content:center; }
  svg { display:block; width:100%; height:auto; max-height:74vh; }
  /* one plate at a time; every plate shares the 1120x630 frame */
  .plane { display:none; }
  .plane.show { display:block; }

  /* ---- the plate surface and its furniture ---------------------------------- */
  .pl       { fill:var(--plate); }
  .hairline { stroke:var(--mute); stroke-opacity:.55; stroke-width:1.5; fill:none; }

  /* ---- the five type roles -------------------------------------------------- */
  .r-datum { font-family:var(--serif); font-size:96px; fill:var(--paper); }
  .r-title { font-family:var(--serif); font-size:44px; fill:var(--paper); }
  .r-label { font-family:var(--mono);  font-size:26px; fill:var(--paper); }
  .r-reg   { font-family:var(--mono);  font-size:24px; fill:var(--mute); letter-spacing:.16em; }
  .r-note  { font-family:var(--mono);  font-size:22px; fill:var(--mute); letter-spacing:.04em; }
  .r-label.amb, .r-datum.amb { fill:var(--mute); }
  /* a count set inside its own bar, plate-on-paper at 14.01:1 — used where a column
     head occupies the space a floating value label would otherwise need */
  .r-label.onbar { fill:var(--plate); }

  /* ---- three stroke weights ------------------------------------------------- */
  .s-hair  { stroke:var(--mute);  stroke-opacity:.55; stroke-width:1.5; fill:none; }
  .s-trace { stroke:var(--paper); stroke-opacity:.14; stroke-width:1.5; fill:none; }
  .s-draw  { stroke:var(--paper); stroke-width:4;  fill:none; }
  .s-bear  { stroke:var(--paper); stroke-width:10; fill:none; }
  .s-bear.gold, .s-draw.gold { stroke:var(--gold); }

  /* ---- five tones as fills -------------------------------------------------- */
  .f-sub   { fill:var(--paper); }
  .f-amb   { fill:var(--mute);  fill-opacity:.55; }
  .f-trace { fill:var(--paper); fill-opacity:.14; }
  .f-gold  { fill:var(--gold); }

  /* ---- the curve FIELD: two states ------------------------------------------ */
  /* Unfocused (the whole curve; all eighteen assembled): every bar is subject, every
     value shows, and the one gold element is the bear baseline.
     Focused (one episode named): the field drops to ambient and LOSES ITS LABELS. The
     named bar is the only thing carrying a Label, and the gold moves to a single bear
     rule beneath it. Reduction, then the drawing, then one name. */
  #plane-curve rect.col        { fill:var(--paper); }
  #plane-curve .v-note         { opacity:1; }
  #plane-curve .nm,
  #plane-curve .dat,
  #plane-curve .mark           { opacity:0; }
  #plane-curve .goldbase       { opacity:1; }
  #plane-curve.focus rect.col  { fill:var(--mute); fill-opacity:.55; }
  #plane-curve.focus .v-note   { opacity:0; }
  #plane-curve.focus .goldbase { opacity:0; }
  #plane-curve.focus .bar.on rect.col { fill:var(--paper); fill-opacity:1; }
  #plane-curve.focus .bar.on .nm,
  #plane-curve.focus .bar.on .dat,
  #plane-curve.focus .bar.on .mark { opacity:1; }

  /* ---- the caption bar: the identity tag only ------------------------------- */
  /* The plate draws its own Register and Title, so the caption no longer repeats them
     on screen. cap-name stays in the DOM for aria-live, visually hidden. */
  .caption { min-height:2.4rem; text-align:center; padding:.6rem 0 .25rem; }
  .caption .cname { position:absolute; width:1px; height:1px; overflow:hidden;
                    clip-path:inset(50%); white-space:nowrap; }
  .caption .ctag { font-family:var(--mono); color:var(--mute); font-size:.9rem;
                   letter-spacing:.04em; display:block; }
  /* ---- controls -------------------------------------------------------------- */
  .bar-nav { display:flex; align-items:center; justify-content:center; gap:1rem;
             padding:.75rem 0 1.25rem; font-family:var(--mono); flex-wrap:wrap; }
  button { font:inherit; font-family:var(--mono); font-size:1rem; color:var(--deep);
           background:var(--paper); border:0; padding:.4rem .9rem; cursor:pointer; }
  button:disabled { opacity:.35; cursor:default; }
  .dots { display:flex; gap:.5rem; flex-wrap:wrap; justify-content:center; }
  .dots button { padding:0; width:.85rem; height:.85rem; border-radius:50%;
                 background:transparent; border:1.5px solid var(--mute); }
  .dots button[aria-current="true"] { background:var(--gold); border-color:var(--gold); }
  .count { color:var(--mute); font-size:.85rem; min-width:4rem; text-align:center; }
  :focus-visible { outline:2px solid var(--gold); outline-offset:2px; }
  a { color:var(--gold); }
  .foot { text-align:center; font-family:var(--mono); font-size:.75rem; color:var(--mute);
          padding-bottom:1rem; }

  /* ---- 375px is a floor, not an aspiration ---------------------------------- */
  /* At a 375px viewport the stage rendered the whole plate at scale 0.31, putting the
     mono factual layer at 4-5 CSS pixels. Below 760px the stage becomes a
     keyboard-walkable scroll box at a fixed 720px: 720/1120 = 0.643, so Label 26
     renders 16.7px and Note 22 renders 14.1px, clearing the design record's 14px mono
     floor. The focus ring is drawn INSIDE the box (Ledger's ratified graft on the
     dimensions matrix) so edge content can never clip it. */
  @media (max-width:760px) {
    .deck  { padding-inline:1rem; }
    .stage { display:block; overflow-x:auto; }
    .stage svg { width:720px; max-width:none; max-height:none; }
    .stage:focus-visible { outline-offset:-2px; }
  }


/* Print: a deck is a card viewer, so printing it naively emits one page showing whichever
   card is current. These rules unstack the cards and break a page between them. The first
   attempt named only .plane and missed .plate entirely — two of the five decks use the other
   name — and it left the stage clipping its overflow, so even the decks it did match
   collapsed to two pages. Screen behaviour is untouched. */
@media print {
  .dots, .nav, button, .foot { display: none !important; }
  html, body { background: #081a35 !important; height: auto !important;
    -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .deck, .stage { height: auto !important; min-height: 0 !important; max-height: none !important;
    overflow: visible !important; display: block !important; position: static !important; }
  .plane, .plate, .title {
    display: block !important; visibility: visible !important; position: static !important;
    opacity: 1 !important; height: auto !important; max-height: none !important;
    overflow: visible !important; page-break-after: always; break-after: page;
    margin: 0 0 4mm; inset: auto !important; }
  .plane svg, .plate svg, .stage > svg {
    width: 100% !important; height: auto !important; max-height: 165mm; display: block; }
  .stage > svg { page-break-after: always; break-after: page; }
  /* the curve plate prints in its unfocused state, so every bar and value is legible */
  #plane-curve rect.col { fill:#f4efe2 !important; fill-opacity:1 !important; }
  #plane-curve .v-note, #plane-curve .goldbase { opacity:1 !important; }
  #plane-curve .nm, #plane-curve .dat, #plane-curve .mark { opacity:0 !important; }
  .cap, .caption { display: block !important; visibility: visible !important; }
  .caption .cname { position:static !important; width:auto !important; height:auto !important;
    clip-path:none !important; overflow:visible !important; }
}
</style>
</head>

<script>
(function(){
  // Cards: identity labels only — the argument itself is the presenter's, off-site.
  // Each card names the plate it shows and, on the curve FIELD, the bar it names.
  // `type` records the plate type; the order is checked so that no two FIELDs run
  // consecutively — a deck that never changes magnification cannot build.
  var CARDS = [
    { plane:"title",    type:"SINGULAR", name:"The Difficulty Curve",
      tag:"eighteen episodes · 245 placed questions" },
    { plane:"curve",    type:"FIELD",    name:"The whole curve",
      tag:"eighteen episodes · 245 placed questions" },
    { plane:"zero",     type:"SINGULAR", name:"Proteus",
      tag:"episode 3 · 0 questions" },
    { plane:"stretch",  type:"SERIES",   name:"Sirens to Oxen of the Sun",
      tag:"episodes 11–14 · 12 · 24 · 12 · 14" },
    { plane:"maxima",   type:"PAIR",     name:"Cyclops",
      tag:"episode 12 · 24 questions · the first half's highest" },
    { plane:"peaks",    type:"SERIES",   name:"Circe · Ithaca · Penelope",
      tag:"the three peaks · 40 · 33 · 38" },
    { plane:"curve",    type:"FIELD",    ids:["e16"], name:"Eumaeus",
      tag:"episode 16 · 20 questions" },
    { plane:"kinds",    type:"SERIES",   name:"The nine kinds",
      tag:"48 · 47 · 42 · 41 · 25 · 22 · 15 · 6 · 6" },
    { plane:"matrix",   type:"FIELD",    name:"Dominant strains, episode by episode",
      tag:"nine kinds against eighteen episodes" },
    { plane:"penelope", type:"PAIR",     name:"Penelope",
      tag:"episode 18 · 38 questions · 12 delight · 7 referent" },
    { plane:"exch",     type:"SERIES",   name:"The sixteen exchanges",
      tag:"8–17 July 2026 · 1 to 33 questions each" },
    { plane:"record",   type:"FIELD",    name:"The record",
      tag:"117 pages · the sixteen exchanges begin here" },
    { plane:"detail",   type:"SERIES",   name:"The survival language",
      tag:"four pages · pdf 30 · 31 · 40 · 56" },
    { plane:"verbatim", type:"SERIES",   name:"Four entries, failed verbatim check",
      tag:"pdf 10 · 39 · 109 · 110 · kept in the counts" },
    { plane:"dict",     type:"PAIR",     name:"Heard and meant",
      tag:"dictation and transcription noise · 6 questions" },
    { plane:"curve",    type:"FIELD",    name:"All eighteen, assembled",
      tag:"245 placed questions across one first reading" }
  ];
  var BARS = ["e1","e2","e3","e4","e5","e6","e7","e8","e9","e10",
              "e11","e12","e13","e14","e15","e16","e17","e18"];
  var PLANES = ["title","curve","zero","stretch","maxima","peaks","kinds","matrix",
                "penelope","exch","record","detail","verbatim","dict"];
  var i = 0;
  var stage = document.getElementById("stage");
  var capName = document.getElementById("cap-name");
  var capTag = document.getElementById("cap-tag");
  var prev = document.getElementById("prev");
  var next = document.getElementById("next");
  var count = document.getElementById("count");
  var dotsWrap = document.getElementById("dots");
  var curve = document.getElementById("plane-curve");

  // build dots — plain buttons carrying aria-current, not a tablist: there are no
  // tabpanels here, and a tablist without them fails the control it claims to be.
  CARDS.forEach(function(c, n){
    var d = document.createElement("button");
    d.setAttribute("aria-label","Card " + (n+1) + ": " + c.name);
    d.addEventListener("click", function(){ go(n); });
    dotsWrap.appendChild(d);
  });
  var dots = dotsWrap.querySelectorAll("button");

  function render(){
    var c = CARDS[i];
    PLANES.forEach(function(p){
      document.getElementById("plane-" + p).classList.toggle("show", p === c.plane);
    });
    // the curve FIELD reduces to ambient only when one episode is named
    var lit = c.ids || [];
    curve.classList.toggle("focus", lit.length > 0);
    BARS.forEach(function(id){
      document.getElementById(id).classList.toggle("on", lit.indexOf(id) >= 0);
    });
    capName.textContent = c.name;
    capTag.textContent = c.tag;
    prev.disabled = (i === 0);
    next.disabled = (i === CARDS.length - 1);
    count.textContent = (i+1) + " / " + CARDS.length;
    dots.forEach(function(d, n){ d.setAttribute("aria-current", n === i ? "true" : "false"); });
  }
  function go(n){ i = Math.max(0, Math.min(CARDS.length - 1, n)); render(); }

  prev.addEventListener("click", function(){ go(i-1); });
  next.addEventListener("click", function(){ go(i+1); });
  // bound to the stage, not the document: a global arrow-key capture fights a screen
  // reader's browse mode and takes the keys from every other control on the page.
  stage.addEventListener("keydown", function(e){
    if (e.key === "ArrowRight" || e.key === "PageDown") { go(i+1); e.preventDefault(); }
    else if (e.key === "ArrowLeft" || e.key === "PageUp") { go(i-1); e.preventDefault(); }
    else if (e.key === "Home") { go(0); e.preventDefault(); }
    else if (e.key === "End") { go(CARDS.length-1); e.preventDefault(); }
  });
  render();
})();
</script>
</body>
</html>
