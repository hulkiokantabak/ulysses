<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Difficulty Curve — the deck</title>
<style>
  /* Dimension 11's presentation register: the audience deck. Image cards only, no
     explanations (the presenter's material is kept off the public site — C-19). Seven
     drawn planes share one stage — the per-episode bar chart of placed questions (the
     signature device, anchor A7), the nine kinds, the strain matrix, Penelope's
     thirty-eight, the sixteen exchanges, the 117-page record, and the dictation pairs.
     A card shows one plane and lights a subset of it in gold. The 1922 family: deep
     plate, paper, gold, mono factual layer. No animation, so prefers-reduced-motion is
     honoured by design. */
  :root {
    --deep:#081a35; --paper:#f4efe2; --gold:#dfa93f; --mute:#b9c3d6;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
  }
  *,*::before,*::after { box-sizing:border-box; }
  html,body { margin:0; padding:0; height:100%; background:var(--deep); color:var(--paper); }
  body { font-family:var(--serif); display:flex; flex-direction:column; min-height:100vh; }
  .deck { flex:1; display:flex; flex-direction:column; max-width:70rem; width:100%;
          margin-inline:auto; padding:1rem 1rem 0; }
  .stage { position:relative; flex:1; display:flex; align-items:center; justify-content:center; }
  svg { display:block; width:100%; height:auto; max-height:74vh; }
  /* one plane at a time; every plane shares the 1040x580 frame */
  .plane { display:none; }
  .plane.show { display:block; }
  /* bars default to muted/short; JS lights the active episode(s) gold + enlarged */
  .bar rect.col { fill:var(--mute); opacity:.5; }
  .bar.on rect.col { fill:var(--gold); opacity:1;
                     transform-box:fill-box; transform-origin:50% 100%; transform:scale(1.14,1.04); }
  .bar .zdot { fill:var(--mute); opacity:.5; }
  .bar.on .zdot { fill:var(--gold); opacity:1; }
  .bar .val, .bar .nm { opacity:0; }
  .bar.on .val, .bar.on .nm { opacity:1; }
  /* pins: a group of marks on a plane, hidden until its card lights it */
  .pin { opacity:0; }
  .bar.on .pin { opacity:1; }
  .pin .tiny { fill:var(--gold); }
  .val { font-family:var(--mono); font-size:19px; fill:var(--gold); }
  .nm { font-family:var(--serif); font-size:14px; fill:var(--paper); }
  .enum { font-family:var(--mono); font-size:13px; fill:var(--mute); }
  .axis { stroke:#b9c3d6; stroke-width:1; }
  .grid { stroke:#b9c3d6; stroke-width:1; opacity:.14; }
  .axlab { font-family:var(--mono); font-size:13px; fill:var(--mute); }
  .axtitle { font-family:var(--mono); font-size:13px; fill:var(--mute); letter-spacing:2px; }
  /* shared drawn-plane type */
  .lab { font-family:var(--mono); font-size:14px; fill:var(--paper); }
  .lab.alt { fill:var(--gold); }
  .tiny { font-family:var(--mono); font-size:12px; fill:var(--mute); }
  .epname { font-family:var(--serif); font-size:12px; fill:var(--mute); }
  .cnt { font-family:var(--mono); font-size:16px; fill:var(--gold); }
  .big { font-family:var(--mono); font-size:19px; fill:var(--paper); }
  .big.gold { fill:var(--gold); }
  .fill-paper { fill:var(--paper); }
  .fill-gold { fill:var(--gold); }
  .out-gold { fill:none; stroke:var(--gold); stroke-width:2; }
  /* the title card overlays the stage */
  .title { position:absolute; inset:0; display:none; flex-direction:column;
           align-items:center; justify-content:center; text-align:center; }
  .title.show { display:flex; }
  .title h1 { font-size:clamp(2rem,7vw,4rem); margin:0 0 .5rem; letter-spacing:.01em; }
  .title .works { font-family:var(--mono); color:var(--mute); font-size:clamp(.9rem,2.4vw,1.15rem);
                  letter-spacing:.12em; }
  .title .rule { width:8rem; height:3px; background:var(--gold); margin:1.25rem 0; }
  .title .sub { font-style:italic; color:var(--paper); max-width:34ch; font-size:clamp(1rem,2.6vw,1.3rem); }
  /* the caption bar reads the current card — identity only */
  .caption { min-height:3.2rem; text-align:center; padding:.5rem 0 .25rem; }
  .caption .cname { font-size:1.4rem; }
  .caption .ctag { font-family:var(--mono); color:var(--mute); font-size:.9rem; letter-spacing:.04em; display:block; margin-top:.15rem; }
  .caption.hidden { visibility:hidden; }
  /* controls */
  .bar-nav { display:flex; align-items:center; justify-content:center; gap:1rem;
             padding:.75rem 0 1.25rem; font-family:var(--mono); flex-wrap:wrap; }
  button { font:inherit; font-family:var(--mono); font-size:1rem; color:var(--deep);
           background:var(--paper); border:0; padding:.4rem .9rem; cursor:pointer; }
  button:disabled { opacity:.35; cursor:default; }
  .dots { display:flex; gap:.5rem; flex-wrap:wrap; justify-content:center; }
  .dots button { padding:0; width:.85rem; height:.85rem; border-radius:50%;
                 background:transparent; border:1.5px solid var(--mute); }
  .dots button[aria-current="true"] { background:var(--gold); border-color:var(--gold); }
  .count { color:var(--mute); font-size:.85rem; min-width:4rem; text-align:center; }
  :focus-visible { outline:2px solid var(--gold); outline-offset:2px; }
  a { color:var(--gold); }
  .foot { text-align:center; font-family:var(--mono); font-size:.75rem; color:var(--mute);
          padding-bottom:1rem; }


/* Print: a deck is a card viewer, so printing it naively emits one page showing whichever
   card is current. These rules unstack the cards and break a page between them. The first
   attempt named only .plane and missed .plate entirely — two of the five decks use the other
   name — and it left the stage clipping its overflow, so even the decks it did match
   collapsed to two pages. Screen behaviour is untouched. */
@media print {
  .dots, .nav, button, .foot { display: none !important; }
  html, body { background: #081a35 !important; height: auto !important;
    -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .deck, .stage { height: auto !important; min-height: 0 !important; max-height: none !important;
    overflow: visible !important; display: block !important; position: static !important; }
  .plane, .plate, .title {
    display: block !important; visibility: visible !important; position: static !important;
    opacity: 1 !important; height: auto !important; max-height: none !important;
    overflow: visible !important; page-break-after: always; break-after: page;
    margin: 0 0 4mm; inset: auto !important; }
  .plane svg, .plate svg, .stage > svg {
    width: 100% !important; height: auto !important; max-height: 165mm; display: block; }
  .stage > svg { page-break-after: always; break-after: page; }
  .cap, .caption { display: block !important; visibility: visible !important; }
}
</style>
</head>

    { kind:"set", ids:["e15","e17","e18"], name:"Circe · Ithaca · Penelope",
      tag:"the three peaks · 40 · 33 · 38" },
    { kind:"set", ids:["e16"], name:"Eumaeus",        tag:"episode 16 · 20 questions" },
    { kind:"plane", plane:"kinds", name:"The nine kinds",
      tag:"48 · 47 · 42 · 41 · 25 · 22 · 15 · 6 · 6" },
    { kind:"plane", plane:"matrix", name:"Dominant strains, episode by episode",
      tag:"nine kinds against eighteen episodes" },
    { kind:"plane", plane:"dots", name:"Penelope",
      tag:"episode 18 · 38 questions · 12 delight · 7 referent" },
    { kind:"plane", plane:"exch", name:"The sixteen exchanges",
      tag:"8–17 July 2026 · 1 to 33 questions each" },
    { kind:"plane", plane:"record", ids:["r-exch"], name:"The record",
      tag:"117 pages · the sixteen exchanges begin here" },
    { kind:"plane", plane:"record", ids:["r-surv"], name:"The survival language",
      tag:"four pages · pdf 30 · 31 · 40 · 56" },
    { kind:"plane", plane:"record", ids:["r-fail"], name:"Four entries, failed verbatim check",
      tag:"pdf 10 · 39 · 109 · 110 · kept in the counts" },
    { kind:"plane", plane:"dict", name:"Heard and meant",
      tag:"dictation and transcription noise · 6 questions" },
    { kind:"all", name:"All eighteen, assembled",     tag:"245 placed questions across one first reading" }
  ];
  var BARS = ["e1","e2","e3","e4","e5","e6","e7","e8","e9","e10",
              "e11","e12","e13","e14","e15","e16","e17","e18"];
  var PINS = ["r-exch","r-surv","r-fail"];
  var PLANES = ["curve","kinds","matrix","dots","exch","record","dict"];
  var i = 0;
  var title = document.getElementById("title");
  var caption = document.getElementById("caption");
  var capName = document.getElementById("cap-name");
  var capTag = document.getElementById("cap-tag");
  var prev = document.getElementById("prev");
  var next = document.getElementById("next");
  var count = document.getElementById("count");
  var dotsWrap = document.getElementById("dots");

  // build dots
  CARDS.forEach(function(c, n){
    var d = document.createElement("button");
    d.setAttribute("role","tab");
    d.setAttribute("aria-label","Card " + (n+1));
    d.addEventListener("click", function(){ go(n); });
    dotsWrap.appendChild(d);
  });
  var dots = dotsWrap.querySelectorAll("button");

  function render(){
    var c = CARDS[i];
    var plane = c.plane || "curve";
    PLANES.forEach(function(p){
      document.getElementById("plane-" + p).classList.toggle("show", p === plane);
    });
    var lit = (c.kind === "all") ? BARS : (c.ids || []);
    BARS.concat(PINS).forEach(function(id){
      document.getElementById(id).classList.toggle("on", lit.indexOf(id) >= 0);
    });
    title.classList.toggle("show", c.kind === "title");
    if (c.kind === "title") {
      caption.classList.add("hidden");
    } else {
      caption.classList.remove("hidden");
      capName.textContent = c.name;
      capTag.textContent = c.tag;
    }
    prev.disabled = (i === 0);
    next.disabled = (i === CARDS.length - 1);
    count.textContent = (i+1) + " / " + CARDS.length;
    dots.forEach(function(d, n){ d.setAttribute("aria-current", n === i ? "true" : "false"); });
  }
  function go(n){ i = Math.max(0, Math.min(CARDS.length - 1, n)); render(); }

  prev.addEventListener("click", function(){ go(i-1); });
  next.addEventListener("click", function(){ go(i+1); });
  document.addEventListener("keydown", function(e){
    if (e.key === "ArrowRight" || e.key === "PageDown") { go(i+1); e.preventDefault(); }
    else if (e.key === "ArrowLeft" || e.key === "PageUp") { go(i-1); e.preventDefault(); }
    else if (e.key === "Home") { go(0); e.preventDefault(); }
    else if (e.key === "End") { go(CARDS.length-1); e.preventDefault(); }
  });
  render();
})();
</script>
</body>
</html>
