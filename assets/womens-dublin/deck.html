<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Women's Dublin — the deck</title>
<style>
  /* Dimension 2's presentation register: the audience deck. Image cards only, no
     explanations (the presenter's material is kept off the public site — C-19). Seven
     drawn planes, one visible at a time; each card lights a subset of the marks on the
     plane it names. Muted by default, gold when lit. The 1922 family: deep plate, paper,
     gold, mono factual layer. Imagery admitted under C-35 (19 Jul 2026): every mark here
     is drawn inline as SVG — nothing is fetched, nothing is decorative. No animation, so
     prefers-reduced-motion is honoured by design. */
  :root {
    --deep:#081a35; --paper:#f4efe2; --gold:#dfa93f; --mute:#b9c3d6;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
  }
  *,*::before,*::after { box-sizing:border-box; }
  html,body { margin:0; padding:0; height:100%; background:var(--deep); color:var(--paper); }
  body { font-family:var(--serif); display:flex; flex-direction:column; min-height:100vh; }
  .deck { flex:1; display:flex; flex-direction:column; max-width:70rem; width:100%;
          margin-inline:auto; padding:1rem 1rem 0; }
  .stage { position:relative; flex:1; display:flex; align-items:center; justify-content:center; }
  svg { display:block; width:100%; height:auto; max-height:72vh; }
  /* one plane visible at a time; the title card overlays whichever plane is showing */
  .plane { display:none; width:100%; }
  .plane.show { display:block; }
  /* MODES PLANE: bars default to muted/narrow; JS lights the active mode(s) gold and
     widens them. The bar height is the datum and never changes — only fill, opacity,
     width, and the count label respond to state. */
  .pt rect.bar { fill:var(--mute); opacity:.5; transform-box:fill-box;
                 transform-origin:bottom center; }
  .pt.on rect.bar { fill:var(--gold); opacity:1; transform:scaleX(1.34); }
  .pt .cnum { opacity:0; font-family:var(--mono); font-size:24px; fill:var(--gold);
              font-weight:600; }
  .pt.on .cnum { opacity:1; }
  /* the drawn vocabulary shared by the six later planes */
  .pt .stroke { fill:none; stroke:var(--mute); stroke-width:2; opacity:.5; }
  .pt.on .stroke { stroke:var(--gold); opacity:1; }
  .pt .hair { fill:none; stroke:var(--mute); stroke-width:1; opacity:.4; }
  .pt.on .hair { stroke:var(--gold); opacity:.85; }
  .pt .solid { fill:var(--mute); opacity:.5; }
  .pt.on .solid { fill:var(--gold); opacity:1; }
  /* NB: no font-size here — a CSS font-size would beat each element's own
     presentation attribute, and these planes size their labels individually. */
  .pt .lab { fill:var(--mute); opacity:.6; font-family:var(--mono); }
  .pt.on .lab { fill:var(--paper); opacity:1; }
  .pt .num { fill:var(--mute); opacity:.6; font-family:var(--mono); font-weight:600; }
  .pt.on .num { fill:var(--gold); opacity:1; }
  .pt .hr { fill:var(--mute); opacity:.4; }
  .pt.on .hr { fill:var(--gold); opacity:1; }
  /* static furniture: axes, frames, field labels — never lit */
  .axis { fill:none; stroke:#b9c3d6; stroke-width:1; opacity:.55; }
  .frame { fill:none; stroke:#b9c3d6; stroke-width:1.5; opacity:.3; }
  .field { fill:#b9c3d6; font-family:var(--mono); opacity:.75; }
  .fieldwide { fill:#b9c3d6; font-family:var(--mono); font-size:13px; letter-spacing:2px; opacity:.75; }
  /* the title card overlays the stage */
  .title { position:absolute; inset:0; display:none; flex-direction:column;
           align-items:center; justify-content:center; text-align:center; }
  .title.show { display:flex; }
  .title h1 { font-size:clamp(2rem,7vw,4rem); margin:0 0 .5rem; letter-spacing:.01em; }
  .title .works { font-family:var(--mono); color:var(--mute); font-size:clamp(.8rem,2.2vw,1.05rem);
                  letter-spacing:.12em; }
  .title .rule { width:8rem; height:3px; background:var(--gold); margin:1.25rem 0; }
  .title .sub { font-style:italic; color:var(--paper); max-width:34ch; font-size:clamp(1rem,2.6vw,1.3rem); }
  /* the caption bar reads the current card — identity only */
  .caption { min-height:3.2rem; text-align:center; padding:.5rem 0 .25rem; }
  .caption .cname { font-size:1.4rem; }
  .caption .ctag { font-family:var(--mono); color:var(--mute); font-size:.9rem; letter-spacing:.04em; display:block; margin-top:.15rem; }
  .caption.hidden { visibility:hidden; }
  /* controls */
  .bar { display:flex; align-items:center; justify-content:center; gap:1rem; flex-wrap:wrap;
         padding:.75rem 0 1.25rem; font-family:var(--mono); }
  button { font:inherit; font-family:var(--mono); font-size:1rem; color:var(--deep);
           background:var(--paper); border:0; padding:.4rem .9rem; cursor:pointer; }
  button:disabled { opacity:.35; cursor:default; }
  .dots { display:flex; gap:.5rem; flex-wrap:wrap; justify-content:center; }
  .dots button { padding:0; width:.85rem; height:.85rem; border-radius:50%;
                 background:transparent; border:1.5px solid var(--mute); }
  .dots button[aria-current="true"] { background:var(--gold); border-color:var(--gold); }
  .count { color:var(--mute); font-size:.85rem; min-width:4rem; text-align:center; }
  :focus-visible { outline:2px solid var(--gold); outline-offset:2px; }
  a { color:var(--gold); }
  .foot { text-align:center; font-family:var(--mono); font-size:.75rem; color:var(--mute);
          padding-bottom:1rem; }


/* Print: a deck is a card viewer, so printing it naively emits one page showing whichever
   card is current. These rules unstack the cards and break a page between them. The first
   attempt named only .plane and missed .plate entirely — two of the five decks use the other
   name — and it left the stage clipping its overflow, so even the decks it did match
   collapsed to two pages. Screen behaviour is untouched. */
@media print {
  .dots, .nav, button, .foot { display: none !important; }
  html, body { background: #081a35 !important; height: auto !important;
    -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .deck, .stage { height: auto !important; min-height: 0 !important; max-height: none !important;
    overflow: visible !important; display: block !important; position: static !important; }
  .plane, .plate, .title {
    display: block !important; visibility: visible !important; position: static !important;
    opacity: 1 !important; height: auto !important; max-height: none !important;
    overflow: visible !important; page-break-after: always; break-after: page;
    margin: 0 0 4mm; inset: auto !important; }
  .plane svg, .plate svg, .stage > svg {
    width: 100% !important; height: auto !important; max-height: 165mm; display: block; }
  .stage > svg { page-break-after: always; break-after: page; }
  .cap, .caption { display: block !important; visibility: visible !important; }
}
</style>
</head>
<body>

<script>
(function(){

  // Each card names the plane it stands on and the marks it lights on that plane.

      tag:"a letter · a photograph · men's talk" },
    { plane:"p-modes", ids:["b-stage","b-glimpse","b-memory","b-talk","b-letter","b-photo"],
      name:"The Women's Dublin — 16 women, six modes",
      tag:"on stage 4 · a glimpse 4 · memory 1 · men's talk 6 · a letter 1 · a photograph 0" },

    { plane:"p-milk", ids:["mw-pints","mw-quarts","mw-pay"],

    { plane:"p-sums", ids:["sum-dilly","sum-milk","sum-cissy","sum-belladam","sum-martha",
      "sum-barmaids","sum-gerty","sum-dignam","sum-may","sum-bellahouse","sum-milly","sum-ann"],

  var pts = [].slice.call(document.querySelectorAll(".pt"));
  var planes = [].slice.call(document.querySelectorAll(".plane"));

  var capTag = document.getElementById("cap-tag");
  var prev = document.getElementById("prev");
  var next = document.getElementById("next");
  var count = document.getElementById("count");
  var dotsWrap = document.getElementById("dots");

  // build dots
  CARDS.forEach(function(c, n){
    var d = document.createElement("button");
    d.setAttribute("role","tab");
    d.setAttribute("aria-label","Card " + (n+1));
    d.addEventListener("click", function(){ go(n); });
    dotsWrap.appendChild(d);
  });
  var dots = dotsWrap.querySelectorAll("button");

  function render(){
    var c = CARDS[i];
    var onset = c.ids || [];
    pts.forEach(function(el){
      el.classList.toggle("on", onset.indexOf(el.id) !== -1);
    });
    planes.forEach(function(pl){
      pl.classList.toggle("show", pl.id === c.plane);
    });
    title.classList.toggle("show", c.kind === "title");
    if (c.kind === "title") {
      caption.classList.add("hidden");
    } else {
      caption.classList.remove("hidden");
      capName.textContent = c.name;
      capTag.textContent = c.tag;

    else if (e.key === "End") { go(CARDS.length-1); e.preventDefault(); }
  });
  render();
})();
