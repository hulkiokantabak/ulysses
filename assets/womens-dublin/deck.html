<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Women's Dublin — the deck</title>
<style>
  /* Dimension 2's presentation register: the audience deck, rebuilt to THE VITRINE
     (19 Jul 2026). One lit case in a dark room: the subject is drawn, the room is a
     trace, and gold is the light — used exactly once per card. Cards carry identity
     labels only; the argument is the presenter's (C-19). Imagery admitted under C-35:
     every mark is inline SVG. No animation, no transitions, no webfonts, no network
     request of any kind — so prefers-reduced-motion is honoured by construction.

     THE SYSTEM, constant with the other four decks:
       canvas   viewBox 0 0 1120 630; one unit = one CSS px at design width
       grid     margins l/r 64, top 48, bottom 64; live area 992 x 518
       bands    register 48-90 (baseline 78) | title 90-160 (baseline 140)
                stage 160-552 | foot 552-590 (baseline 580)
       type     datum 96 serif · title 44 serif · label 26 mono
                register 24 mono UPPER .16em · note 22 mono .04em
       stroke   hair 1.5 · draw 4 · bear 10   (ratio 1 : 2.5 : 6)
       marks    ambient r5 · lit r14 (scale 2.8, ~8x area)
       tones    ground #081a35 · plate #0b2140 · trace paper .14 (decorative)
                ambient text #b9c3d6 @1 (9.07:1) · ambient mark #b9c3d6 @.55 (3.70:1)
                subject #f4efe2 (14.01:1) · accent #dfa93f (7.57:1)
                all recomputed against the PLATE, not the ground — see the note below */
  :root {
    --deep:#081a35; --plate:#0b2140; --paper:#f4efe2; --gold:#dfa93f; --mute:#b9c3d6;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
  }
  *,*::before,*::after { box-sizing:border-box; }
  html,body { margin:0; padding:0; height:100%; background:var(--deep); color:var(--paper); }
  body { font-family:var(--serif); display:flex; flex-direction:column; min-height:100vh; }
  .deck { flex:1; display:flex; flex-direction:column; max-width:76rem; width:100%;
          margin-inline:auto; padding:1rem 3rem 0; }
  .stage { position:relative; flex:1; display:flex; align-items:center; justify-content:center; }
  svg { display:block; width:100%; height:auto; max-height:72vh; }
  /* one drawn surface visible at a time */
  .plane { display:none; width:100%; }
  .plane.show { display:block; }

  /* ---------- shared furniture, identical on every plate ---------- */
  /* Ambient TEXT is full-opacity mute (9.07:1) — the project's declared, checker-enforced
     pairing. Only ambient MARKS AND STROKES ride at .55 (3.70:1), where the 3:1 UI floor
     applies. Compositing the factual layer to .55 would have put every register line,
     axis label and badge at 3.70:1, under the 4.5 text floor. */
  .reg   { font-family:var(--mono); font-size:24px; letter-spacing:.16em;
           fill:var(--mute); }
  .ptitle{ font-family:var(--serif); font-size:44px; fill:var(--paper); }
  .datum { font-family:var(--serif); font-size:96px; fill:var(--gold); }
  .note  { font-family:var(--mono); font-size:22px; letter-spacing:.04em;
           fill:var(--mute); }
  .covsub{ font-family:var(--serif); font-size:44px; font-style:italic; fill:var(--paper); }
  /* the shoulder: one hairline at y=100 on eighty cards */
  .shoulder { fill:none; stroke:var(--paper); stroke-width:1.5; opacity:.14; }
  .trace    { fill:none; stroke:var(--paper); stroke-width:1.5; opacity:.14; }
  .ambline  { fill:none; stroke:var(--mute);  stroke-width:1.5; opacity:.55; }
  .bear     { fill:none; stroke:var(--mute);  stroke-width:10;  opacity:.55; }
  .beargold { fill:none; stroke:var(--gold);  stroke-width:10; }
  .frame    { fill:none; stroke:var(--mute);  stroke-width:1.5; opacity:.55; }
  .subfill  { fill:var(--paper); }

  /* ---------- the three-step: reduce, draw, name once ----------
     REDUCE — anything unlit drops to hair weight, ambient tone, and loses its label.
     DRAW   — the subject at draw weight, subject tone, lit mark size; it alone is labelled.
     NAME   — exactly one gold element per card: the datum, or (on the cover) one bear rule.
     No transition is declared anywhere: state changes are instantaneous by construction. */
  .pt .draw { fill:none; stroke:var(--mute); stroke-width:1.5; opacity:.55; }
  .pt.on .draw { stroke:var(--paper); stroke-width:4; opacity:1; }
  .pt .thin { fill:none; stroke:var(--paper); stroke-width:1.5; opacity:.14; }
  .pt.on .thin { stroke:var(--paper); stroke-width:1.5; opacity:.14; }
  .pt .fill { fill:var(--mute); opacity:.55; }
  .pt.on .fill { fill:var(--paper); opacity:1; }
  .pt .mark { fill:var(--mute); opacity:.55; transform-box:fill-box; transform-origin:center; }
  .pt.on .mark { fill:var(--paper); opacity:1; transform:scale(2.8); }
  .pt .bar { fill:var(--mute); opacity:.55; transform-box:fill-box; transform-origin:center; }
  .pt.on .bar { fill:var(--paper); opacity:1; transform:scaleY(3.3333); }
  /* labels belong to the subject only — ambient context carries no text at all */
  .pt .lab, .pt .sub { display:none; }
  .pt.on .lab { display:inline; fill:var(--paper); font-family:var(--mono); font-size:26px; }
  .pt.on .sub { display:inline; fill:var(--mute); font-family:var(--mono);
                font-size:22px; letter-spacing:.04em; }
  .pt.on .lab .hr { fill:var(--mute); font-size:22px; }
  /* one card assembles the whole field; there the shape is the subject, not any name */
  .plane.bare .pt.on .lab, .plane.bare .pt.on .sub { display:none; }

  /* ---------- chrome (byte-identical across the five decks) ---------- */
  .caption { min-height:3.2rem; text-align:center; padding:.5rem 0 .25rem; }
  .caption .cname { position:absolute; width:1px; height:1px; padding:0; margin:-1px;
                    overflow:hidden; clip:rect(0 0 0 0); clip-path:inset(50%); white-space:nowrap; }
  .caption .ctag { font-family:var(--mono); color:var(--mute); font-size:.9rem;
                   letter-spacing:.04em; display:block; }
  .caption.hidden { visibility:hidden; }
  .bar-ui { display:flex; align-items:center; justify-content:center; gap:1rem; flex-wrap:wrap;
            padding:.75rem 0 1.25rem; font-family:var(--mono); }
  button { font:inherit; font-family:var(--mono); font-size:1rem; color:var(--deep);
           background:var(--paper); border:0; padding:.4rem .9rem; cursor:pointer; }
  button:disabled { opacity:.35; cursor:default; }
  .dots { display:flex; gap:.5rem; flex-wrap:wrap; justify-content:center; }
  .dots button { padding:0; width:.85rem; height:.85rem; border-radius:50%;
                 background:transparent; border:1.5px solid var(--mute); }
  .dots button[aria-current="true"] { background:var(--gold); border-color:var(--gold); }
  .count { color:var(--mute); font-size:.85rem; min-width:4rem; text-align:center; }
  :focus-visible { outline:2px solid var(--gold); outline-offset:2px; }
  a { color:var(--gold); }
  .foot { text-align:center; font-family:var(--mono); font-size:.75rem; color:var(--mute);
          padding-bottom:1rem; }

  /* Narrow viewports: the accessibility floor says this works at 375px. A 1120-unit
     viewBox scaled to a 343px stage would render the mono factual layer at 4-5 CSS px.
     Instead the stage becomes a keyboard-walkable scroll box at a fixed 720px — 0.64
     scale, so label 26 renders 16.6px and note 22 renders 14.1px, clearing the design
     record's 14px mono floor. The focus ring is drawn inside so edge content cannot
     clip it (Ledger's graft on the dimensions matrix — ratified precedent). */
  @media (max-width:760px) {
    .deck { padding:1rem 1rem 0; }
    .stage { overflow-x:auto; display:block; }
    svg { width:720px; max-width:none; max-height:none; }
    :focus-visible { outline-offset:-2px; }
  }

/* Print: a deck is a card viewer, so printing it naively emits one page showing whichever
   card is current. These rules unstack the drawn surfaces and break a page between them. */
@media print {
  .dots, .bar-ui, .nav, button, .foot { display: none !important; }
  html, body { background: #081a35 !important; height: auto !important;
    -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .deck, .stage { height: auto !important; min-height: 0 !important; max-height: none !important;
    overflow: visible !important; display: block !important; position: static !important;
    padding: 0 !important; max-width: none !important; }
  .plane, .plate, .title {
    display: block !important; visibility: visible !important; position: static !important;
    opacity: 1 !important; height: auto !important; max-height: none !important;
    overflow: visible !important; page-break-after: always; break-after: page;
    margin: 0 0 4mm; inset: auto !important; }
  .plane svg, .plate svg, .stage > svg {
    width: 100% !important; height: auto !important; max-height: 165mm; display: block; }
  .stage > svg { page-break-after: always; break-after: page; }
  .cap, .caption { display: block !important; visibility: visible !important; }
  .caption .cname { position: static !important; width: auto !important; height: auto !important;
    margin: 0 !important; overflow: visible !important; clip: auto !important;
    clip-path: none !important; }
}
</style>
</head>
<body>
<div class="deck">
  <div class="stage" id="stage" tabindex="0" role="group" aria-roledescription="slide deck"
       aria-label="The Women's Dublin, an audience deck. Use the left and right arrow keys.">

    <!-- ================= PLATE 0 — THE COVER (singular) ================= -->

      <title id="t-title">The Women's Dublin — cover plate</title>

      upper field, one for each woman in the census. Beneath them a monospaced line reads
      sixteen women, 181 appearances, six modes of entry, underscored by a short gold
      rule.</desc>
      <rect x="32" y="24" width="1056" height="582" fill="#0b2140"/>
      <text x="64" y="78" class="reg">AN AUDIENCE DECK · DIMENSION 02</text>
      <line x1="64" y1="100" x2="1056" y2="100" class="shoulder"/>
      <text x="64" y="140" class="ptitle" data-role="ptitle">The Women's Dublin</text>

      <g class="subfill">
        <circle cx="78"  cy="220" r="14"/><circle cx="124" cy="220" r="14"/>
        <circle cx="170" cy="220" r="14"/><circle cx="216" cy="220" r="14"/>
        <circle cx="262" cy="220" r="14"/><circle cx="308" cy="220" r="14"/>
        <circle cx="354" cy="220" r="14"/><circle cx="400" cy="220" r="14"/>
        <circle cx="446" cy="220" r="14"/><circle cx="492" cy="220" r="14"/>
        <circle cx="538" cy="220" r="14"/><circle cx="584" cy="220" r="14"/>
        <circle cx="630" cy="220" r="14"/><circle cx="676" cy="220" r="14"/>
        <circle cx="722" cy="220" r="14"/><circle cx="768" cy="220" r="14"/>
      </g>
      <text x="64" y="300" class="reg">SIXTEEN WOMEN · 181 APPEARANCES · SIX MODES OF ENTRY</text>
      <line x1="64" y1="336" x2="264" y2="336" class="beargold"/>
      <text x="64" y="424" class="covsub">Who enters the room —</text>
      <text x="64" y="478" class="covsub">and who arrives at a remove.</text>

      <text x="64" y="580" class="note" data-role="cfoot">Dimension 02 · an audience deck</text>
      <text x="1056" y="580" text-anchor="end" class="note">02 · THE WOMEN'S DUBLIN</text>
    </svg>
    </div>

      entry, read top to bottom: on stage 4, a glimpse 4, memory 1, men's talk 6, a letter 1,
      a photograph 0. A scale of nought to six runs across the head of the field. Unlit bars
      are thin and unlabelled; the lit bar thickens, turns paper-white and takes its
      name.</desc>
      <rect x="32" y="24" width="1056" height="582" fill="#0b2140"/>
      <text x="64" y="78" class="reg">MODE OF ENTRY · COUNTED BY FIRST APPEARANCE</text>
      <line x1="64" y1="100" x2="1056" y2="100" class="shoulder"/>
      <text x="64" y="140" class="ptitle" data-role="ptitle">On stage</text>

      <!-- the count scale -->
      <g class="note" text-anchor="middle">
        <text x="320" y="178">0</text><text x="432" y="178">1</text>
        <text x="544" y="178">2</text><text x="656" y="178">3</text>
        <text x="768" y="178">4</text><text x="880" y="178">5</text>
        <text x="992" y="178">6</text>
      </g>
      <g class="trace">
        <line x1="432" y1="190" x2="432" y2="476"/><line x1="544" y1="190" x2="544" y2="476"/>
        <line x1="656" y1="190" x2="656" y2="476"/><line x1="768" y1="190" x2="768" y2="476"/>
        <line x1="880" y1="190" x2="880" y2="476"/><line x1="992" y1="190" x2="992" y2="476"/>
      </g>
      <!-- the baseline that carries the measurement -->
      <line x1="320" y1="186" x2="320" y2="482" class="bear"/>

      <g class="pt" id="b-stage">
        <rect class="bar" x="320" y="194" width="448" height="12"/>
        <text class="lab" x="64" y="209">on stage</text>
        <text class="lab" x="784" y="209">4</text>
      </g>
      <g class="pt" id="b-glimpse">
        <rect class="bar" x="320" y="246" width="448" height="12"/>
        <text class="lab" x="64" y="261">a glimpse</text>
        <text class="lab" x="784" y="261">4</text>
      </g>
      <g class="pt" id="b-memory">

      <text x="64" y="580" class="note" data-role="cfoot">4 of 16 women</text>
      <text x="1056" y="580" text-anchor="end" class="note">02 · THE WOMEN'S DUBLIN</text>
    </svg>
    </div>
    <!-- ====== PLATE 2 — THE MILK WOMAN'S RECKONING (series, three rows) ====== -->
    <div class="plane" id="p-milk">
    <svg viewBox="0 0 1120 630" role="img" aria-labelledby="t-milk d-milk">
      <title id="t-milk">The milk woman's account, reckoned aloud</title>
      <desc id="d-milk">Three rows of drawn coins. Seven small coins marked twopence, then
      three larger coins marked fourpence, then one large florin marked two shillings beside
      two single pennies. Each row is named at its left and totalled at its right: a shilling
      and twopence over, a shilling, twopence owed.</desc>
      <rect x="32" y="24" width="1056" height="582" fill="#0b2140"/>
      <text x="64" y="78" class="reg">THE MILK WOMAN'S ACCOUNT, RECKONED ALOUD · EPISODE 1</text>
      <line x1="64" y1="100" x2="1056" y2="100" class="shoulder"/>
      <text x="64" y="140" class="ptitle" data-role="ptitle">The milk woman</text>

      <g class="pt" id="mw-pints">
        <text class="lab" x="64" y="200">seven mornings · a pint at twopence</text>
        <circle class="draw" cx="94"  cy="252" r="30"/><text class="lab" x="94"  y="261" text-anchor="middle">2d</text>
        <circle class="draw" cx="166" cy="252" r="30"/><text class="lab" x="166" y="261" text-anchor="middle">2d</text>
        <circle class="draw" cx="238" cy="252" r="30"/><text class="lab" x="238" y="261" text-anchor="middle">2d</text>
        <circle class="draw" cx="310" cy="252" r="30"/><text class="lab" x="310" y="261" text-anchor="middle">2d</text>
        <circle class="draw" cx="382" cy="252" r="30"/><text class="lab" x="382" y="261" text-anchor="middle">2d</text>
        <circle class="draw" cx="454" cy="252" r="30"/><text class="lab" x="454" y="261" text-anchor="middle">2d</text>
        <circle class="draw" cx="526" cy="252" r="30"/><text class="lab" x="526" y="261" text-anchor="middle">2d</text>
        <text class="lab" x="580" y="262">a shilling and twopence over</text>
      </g>

      <g class="pt" id="mw-quarts">
        <text class="lab" x="64" y="330">three mornings · a quart at fourpence</text>
        <circle class="draw" cx="102" cy="382" r="38"/><text class="lab" x="102" y="391" text-anchor="middle">4d</text>
        <circle class="draw" cx="194" cy="382" r="38"/><text class="lab" x="194" y="391" text-anchor="middle">4d</text>
        <circle class="draw" cx="286" cy="382" r="38"/><text class="lab" x="286" y="391" text-anchor="middle">4d</text>
        <text class="lab" x="580" y="392">a shilling</text>
      </g>

      <g class="pt" id="mw-pay">

        <circle class="draw" cx="110" cy="505" r="46"/>
        <circle class="thin" cx="110" cy="505" r="36"/>
        <text class="lab" x="110" y="514" text-anchor="middle">2s</text>
        <circle class="draw" cx="200" cy="505" r="24"/><text class="lab" x="200" y="514" text-anchor="middle">1d</text>
        <circle class="draw" cx="256" cy="505" r="24"/><text class="lab" x="256" y="514" text-anchor="middle">1d</text>
        <text class="lab" x="580" y="515">twopence owed</text>
      </g>

      <text x="1056" y="548" text-anchor="end" class="datum" data-role="datum">2s 2d</text>
      <text x="64" y="580" class="note" data-role="cfoot">episode 1 · ~8:15 a.m. · one call · one exit</text>
      <text x="1056" y="580" text-anchor="end" class="note">02 · THE WOMEN'S DUBLIN</text>
    </svg>
    </div>

    <!-- ========= PLATE 3 — MARTHA CLIFFORD, THE POST (singular) ========= -->
    <div class="plane" id="p-post">
    <svg viewBox="0 0 1120 630" role="img" aria-labelledby="t-post d-post">
      <title id="t-post">Martha Clifford — what reaches Bloom</title>
      <desc id="d-post">A large drawn envelope fills the left two thirds of the field, two
      further sheets stacked behind it, a blank stamp at its upper right. Its face is
      addressed to Miss Martha Clifford, care of the Post Office, Dolphin's Barn Lane,
      Dublin. To the right, a pressed flower drawn as four crossed petals, and below it a
      postal order for two shillings.</desc>
      <rect x="32" y="24" width="1056" height="582" fill="#0b2140"/>
      <text x="64" y="78" class="reg">WHAT REACHES BLOOM · EPISODES 5, 11, 17</text>

      <text x="64" y="140" class="ptitle" data-role="ptitle">Martha Clifford</text>

        <line class="thin" x1="736" y1="440" x2="936" y2="440"/>

      <text x="1056" y="580" text-anchor="end" class="note">02 · THE WOMEN'S DUBLIN</text>
    </svg>
    </div>
    <!-- ========= PLATE 4 — ANN HATHAWAY, SIXTEEN SQUARES (field) ========= -->
    <div class="plane" id="p-ann">
    <svg viewBox="0 0 1120 630" role="img" aria-labelledby="t-ann d-ann">
      <title id="t-ann">Ann Hathaway — one square per appearance</title>
      <desc id="d-ann">Sixteen squares in two rows of eight, one per appearance, each marked
      with its episode: twelve read episode 9, one episode 14, three episode 15. Fourteen of
      the squares are filled — the appearances in men's talk; the last two are left as empty
      outlines, the two hallucinated appearances.</desc>
      <rect x="32" y="24" width="1056" height="582" fill="#0b2140"/>
      <text x="64" y="78" class="reg">ANN HATHAWAY · ONE SQUARE PER APPEARANCE</text>
      <line x1="64" y1="100" x2="1056" y2="100" class="shoulder"/>
      <text x="64" y="140" class="ptitle" data-role="ptitle">Ann Hathaway</text>

      <g class="frame">
        <rect x="64"  y="200" width="80" height="80"/><rect x="180" y="200" width="80" height="80"/>

  //   datum  — the ONE gold element on the card, serif 96
  //   foot   — the source qualifier, mono 22, bottom-left
  //   name   — the full identity line, visually hidden, read by aria-live
  //   tag    — the identity tag, shown under the plate
  //   bare   — the assembled field: the shape is the subject, so no mark takes a label
  var CARDS = [
    { kind:"title", plane:"p-title", title:"The Women's Dublin",
      foot:"Dimension 02 · an audience deck" },

    { plane:"p-modes", ids:["b-stage"], title:"On stage", datum:"4", foot:"4 of 16 women",
      name:"On stage — 4 of 16",
      tag:"Molly · the milkwoman · Mrs Breen · Cissy Caffrey" },
    { plane:"p-modes", ids:["b-glimpse"], title:"A glimpse", datum:"4", foot:"4 of 16 women",
      name:"A glimpse — 4 of 16",
      tag:"Gerty MacDowell · Dilly Dedalus · the streetwalker · Douce & Kennedy" },
    { plane:"p-modes", ids:["b-letter"], title:"A letter", datum:"1", foot:"1 of 16 women",
      name:"A letter — 1 of 16",
      tag:"Martha Clifford · letter to 'Henry Flower' (Bloom's alias)" },
    { plane:"p-modes", ids:["b-photo"], title:"A photograph", datum:"0", foot:"0 of 16 women",
      name:"A photograph — 0 of 16",
      tag:"no first entrance is a photograph · Molly's photograph comes later (ep 16)" },
    { plane:"p-modes", ids:["b-talk"], title:"Men's talk", datum:"6", foot:"6 of 16 women",
      name:"Men's talk — 6 of 16",
      tag:"Milly · May Dedalus · Bella Cohen · Mrs Dignam · Mina Purefoy · Ann Hathaway" },
    { plane:"p-modes", ids:["b-memory"], title:"Memory", datum:"1", foot:"1 of 16 women",
      name:"Memory — 1 of 16",
      tag:"Mrs Riordan (Dante)" },
    { plane:"p-modes", ids:["b-talk","b-letter","b-photo"], title:"At one remove", datum:"7",
      foot:"7 of 16 women",
      name:"At one remove — 7 of 16",
      tag:"a letter · a photograph · men's talk" },
    { plane:"p-modes", ids:["b-stage","b-glimpse","b-memory","b-talk","b-letter","b-photo"],
      title:"The Women's Dublin", datum:"16", foot:"sixteen women · six modes of entry",
      name:"The Women's Dublin — 16 women, six modes",
      tag:"on stage 4 · a glimpse 4 · memory 1 · men's talk 6 · a letter 1 · a photograph 0" },

    { plane:"p-milk", ids:["mw-pints","mw-quarts","mw-pay"], title:"The milk woman",
      datum:"2s 2d", foot:"episode 1 · ~8:15 a.m. · one call · one exit",
      name:"The milk woman — episode 1, ~8:15 a.m.",
      tag:"seven pints at twopence · three quarts at fourpence · a florin, twopence owed · no home given" },

    { plane:"p-post", ids:["mc-letters","mc-flower","mc-order"], title:"Martha Clifford",
      datum:"3", foot:"the text places her body nowhere in Dublin",
      name:"Martha Clifford — c/o P. O. Dolphin's Barn Lane",
      tag:"3 typewritten letters · a pressed flower · a postal order, two shillings" },

    { plane:"p-ann", ids:["ah-talk"], title:"Ann Hathaway", datum:"14",
      foot:"16 appearances · 14 in men's talk",
      name:"Ann Hathaway — 16 appearances, 14 men's talk",
      tag:"12 in episode 9 · 1 in episode 14 · 3 in episode 15 · 2 hallucinated" },

    { plane:"p-wage", ids:["mi-wage"], title:"Milly Bloom", datum:"12s 6d",
      foot:"Mullingar, the photo business",
      name:"Milly Bloom — twelve and six a week",
      tag:"the only young woman's wage the text states · Mullingar, the photo business" },

    { plane:"p-sums", ids:["sum-dilly","sum-milk","sum-cissy","sum-belladam","sum-martha",
      "sum-barmaids","sum-gerty","sum-dignam","sum-may","sum-bellahouse","sum-milly","sum-ann"],
      title:"Twelve sums, as the text names them", datum:"12",
      foot:"1d to 40s, as the 1922 text names them",
      name:"Twelve sums, as the text names them",
      tag:"1d · 2d · 1s · 1s · 2s · 2s 9d · 4s 11d · 5s · 8s · 10s · 12s 6d · 40s" },

    { plane:"p-molly", ids:["mb-18"], title:"Molly Bloom", datum:"18",
      foot:"episode 18 · the whole episode",
      name:"Molly Bloom — interiority: episode 18",
      tag:"episodes 1–17, none · episode 18, the whole episode" },

    { plane:"p-day", ids:["d-molly","d-milly","d-may","d-milk"],
      title:"The eight o'clock hour", datum:"4", foot:"4 of 16 first entrances",
      name:"The eight o'clock hour — 4 of 16",
      tag:"Molly Bloom · Milly Bloom · May Dedalus · the milk woman" },
    { plane:"p-day", ids:["d-bella"], title:"Bella Cohen", datum:"12:15",
      foot:"episode 15 · the last of the sixteen",
      name:"Bella Cohen — ~12:15 a.m., episode 15",
      tag:"the last of the sixteen first entrances" },
    { plane:"p-day", bare:true, ids:["d-molly","d-milly","d-may","d-milk","d-martha","d-riordan",
      "d-dignam","d-breen","d-dilly","d-mina","d-ann","d-barmaids","d-gerty","d-street",
      "d-cissy","d-bella"],
      title:"Sixteen first entrances", datum:"16", foot:"~8:00 a.m. to ~12:15 a.m.",
      name:"Sixteen first entrances — ~8:00 a.m. to ~12:15 a.m.",
      tag:"one mark for each woman, at the hour she first comes onto the page" }
  ];

  var pts = [].slice.call(document.querySelectorAll(".pt"));
  var planes = [].slice.call(document.querySelectorAll(".plane"));
  var i = 0;
  var stage = document.getElementById("stage");
  var caption = document.getElementById("caption");
  var capName = document.getElementById("cap-name");
  var capTag = document.getElementById("cap-tag");
  var prev = document.getElementById("prev");
  var next = document.getElementById("next");
  var count = document.getElementById("count");
  var dotsWrap = document.getElementById("dots");

  // build dots
  CARDS.forEach(function(c, n){
    var d = document.createElement("button");
    d.setAttribute("aria-label","Card " + (n+1));
    d.addEventListener("click", function(){ go(n); });
    dotsWrap.appendChild(d);
  });
  var dots = [].slice.call(dotsWrap.querySelectorAll("button"));

  // The plate carries its own title, datum and foot, so the card no longer repeats
  // itself in the caption. Values are written into the CURRENT plate only and left
  // standing on the others, so a print run emits every plate with a coherent head.
  function setRole(plane, role, value){
    if (value === undefined) return;
    var el = plane.querySelector('[data-role="' + role + '"]');
    if (el) el.textContent = value;
  }

  function render(){
    var c = CARDS[i];
    var onset = c.ids || [];
    pts.forEach(function(el){
      el.classList.toggle("on", onset.indexOf(el.id) !== -1);
    });
    planes.forEach(function(pl){
      pl.classList.toggle("show", pl.id === c.plane);
      if (pl.id === c.plane) {
        pl.classList.toggle("bare", !!c.bare);
        setRole(pl, "ptitle", c.title);
        setRole(pl, "datum", c.datum);
        setRole(pl, "cfoot", c.foot);
      }
    });
    if (c.kind === "title") {
      caption.classList.add("hidden");
      capName.textContent = c.title;
      capTag.textContent = "";
    } else {
      caption.classList.remove("hidden");
      capName.textContent = c.name;
      capTag.textContent = c.tag;
    }
    prev.disabled = (i === 0);
    next.disabled = (i === CARDS.length - 1);
    count.textContent = (i+1) + " / " + CARDS.length;
    dots.forEach(function(d, n){
      if (n === i) { d.setAttribute("aria-current","true"); }
      else { d.removeAttribute("aria-current"); }
    });
  }
  function go(n){ i = Math.max(0, Math.min(CARDS.length - 1, n)); render(); }

  prev.addEventListener("click", function(){ go(i-1); });
  next.addEventListener("click", function(){ go(i+1); });
  // bound to the stage, not the document: arrows belong to the deck when the deck has
  // focus, and must not be taken away from a screen reader's browse mode elsewhere.
  stage.addEventListener("keydown", function(e){
    if (e.key === "ArrowRight" || e.key === "PageDown") { go(i+1); e.preventDefault(); }
    else if (e.key === "ArrowLeft" || e.key === "PageUp") { go(i-1); e.preventDefault(); }
    else if (e.key === "Home") { go(0); e.preventDefault(); }
    else if (e.key === "End") { go(CARDS.length-1); e.preventDefault(); }
  });
  render();
})();
</script>
</body>
</html>
