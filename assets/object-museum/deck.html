<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Object Museum — the deck</title>
<style>
  /* Dimension 1's presentation register: the audience deck, rebuilt to THE VITRINE
     (ratified 20 July 2026). The deck is a lit case in a dark room. Every card is one
     object under one light: the subject is drawn, the room is a trace, and gold is the
     light, used ONCE per plate. Focus is made by weight and by isolation and only
     confirmed by gold — never created by it.

     The constants, identical on every plate: viewBox 1120x630 (16:9, one unit = one CSS
     pixel at design width); margins 64/48/64; four bands — Register 48-90, Title 90-160,
     Stage 160-552, Foot 552-590; the shoulder hairline at y=100; the lifted plate rect
     (#0b2140 on the darker #081a35 room, no border); the dimension badge bottom-right.
     Five type sizes (96/44/26/24/22); uppercase is confined to the Register role. Three
     stroke weights (1.5 hair / 4 draw / 10 bear) and five tones. Mark vocabulary: solid
     = present, hair ring = recalled, diamond = hallucinated. Ambient r=5, lit r=14.

     C-19 holds: cards carry identity labels — a name, an hour, a count, a sum — and never
     the argument, which belongs to the presenter. No animation, so prefers-reduced-motion
     is honoured by construction. No network request of any kind. Every count, hour, place
     and name is read from the museum artifact's thirty-two cases and 301 stations. */
  :root {
    --deep:#081a35; --plate:#0b2140; --paper:#f4efe2; --gold:#dfa93f; --mute:#b9c3d6;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
    /* the five sizes, in viewBox units = CSS px at design width */
    --t-datum:96px; --t-title:44px; --t-label:26px; --t-reg:24px; --t-note:22px;
  }
  *,*::before,*::after { box-sizing:border-box; }
  html,body { margin:0; padding:0; height:100%; background:var(--deep); color:var(--paper); }
  body { font-family:var(--serif); display:flex; flex-direction:column; min-height:100vh; }
  /* 76rem less 2x3rem of padding = 1120px of stage at design width: one unit, one pixel. */
  .deck { flex:1; display:flex; flex-direction:column; max-width:76rem; width:100%;
          margin-inline:auto; padding:1rem 3rem 0; }
  .stage { position:relative; flex:1; display:flex; align-items:center; justify-content:center; }
  svg { display:block; width:100%; height:auto; max-height:72vh; }
  /* one plane visible at a time; the card handler switches them */
  .plane { display:none; }
  .plane.show { display:block; }

  /* THE FIVE TYPE ROLES ------------------------------------------------------- */
  .datum { font-family:var(--serif); font-size:var(--t-datum); fill:var(--paper); }
  .ttl   { font-family:var(--serif); font-size:var(--t-title); fill:var(--paper); }
  .lab   { font-family:var(--mono);  font-size:var(--t-label); fill:var(--paper); }
  .reg   { font-family:var(--mono);  font-size:var(--t-reg); letter-spacing:.16em;
           fill:var(--mute); fill-opacity:.55; }
  .note  { font-family:var(--mono);  font-size:var(--t-note); letter-spacing:.04em;
           fill:var(--mute); fill-opacity:.55; }
  .gild  { fill:var(--gold); fill-opacity:1; }

  /* THREE WEIGHTS, FIVE TONES ------------------------------------------------- */
  .trace { stroke:var(--paper); stroke-opacity:.14; stroke-width:1.5; fill:none; }
  .hair  { stroke:var(--mute);  stroke-opacity:.55; stroke-width:1.5; fill:none; }
  .draw  { stroke:var(--paper); stroke-width:4; fill:none; }
  .bear  { stroke:var(--paper); stroke-width:10; fill:none; }
  .gbear { stroke:var(--gold);  stroke-width:10; fill:none; }
  .amb   { fill:var(--mute); fill-opacity:.55; }   /* ambient mark, r=5 */
  .subj  { fill:var(--paper); }                    /* the drawn subject */

  /* THE DAY-TIMELINE ---------------------------------------------------------- */
  /* Reduce: unlit lanes drop to hair weight and a field of r=5 ambient marks, and lose
     their labels entirely. Draw: the lit lane rises to a paper bear rule under r=9 paper
     marks and is the only lane carrying a Label. Name once: its terminal station, gold. */
  .pt line.lane     { stroke:var(--mute); stroke-opacity:.55; stroke-width:1.5; }
  .pt.on line.lane  { stroke:var(--paper); stroke-opacity:1; stroke-width:10; }
  .pt circle.dot    { fill:var(--mute); fill-opacity:.55; r:5px; transition:none; }
  .pt.on circle.dot { fill:var(--paper); fill-opacity:1; r:9px; }
  .pt circle.last   { r:5px; }
  .pt.on circle.last{ fill:var(--gold); fill-opacity:1; r:14px; }
  .pt .plabel, .pt .ptag { opacity:0; }
  .pt.on .plabel, .pt.on .ptag { opacity:1; }
  #converge { opacity:0; }
  /* The assembled card lights all seven at once, so the plate re-composes rather than
     repeating itself seven times over: lanes stand down to draw weight, the seven gold
     terminals stand down to paper, the counts stand down (each is on its own card), and
     the single gold element becomes the 2 a.m. rule they all run into. */
  .assembled .pt.on line.lane   { stroke-width:4; }
  .assembled .pt.on circle.last { fill:var(--paper); fill-opacity:1; r:9px; }
  .assembled .pt .ptag          { opacity:0; }
  .assembled #converge          { opacity:1; }

  /* The title card is a drawn plate like every other card (p-title), not an HTML caption
     floating over a live timeline — which is what it was, and what made the deck open on a
     lit chart it was not yet talking about. The h1 stays in the document, visually hidden,
     so the page keeps a real heading; the plate carries the visible one. */
  .vh { position:absolute; width:1px; height:1px; overflow:hidden;
        clip-path:inset(50%); white-space:nowrap; }
  /* the title plate's standfirst: the Title size, italic, because it is prose and not a label */
  .sub { font-family:var(--serif); font-style:italic; fill:var(--paper); font-size:var(--t-title); }
  /* The caption bar reads the current card — the identity tag only. The name stays in the
     DOM for aria-live but is visually hidden: the plate already draws its own title, and
     double-titling every card was costing each plate its top-left. */
  .caption { min-height:2.4rem; text-align:center; padding:.5rem 0 .25rem; }
  .caption .cname { position:absolute; width:1px; height:1px; overflow:hidden;
                    clip-path:inset(50%); white-space:nowrap; }
  .caption .ctag { font-family:var(--mono); color:var(--mute); font-size:.9rem;
                   letter-spacing:.04em; display:block; }
  .caption.hidden { visibility:hidden; }
  /* controls */
  .bar { display:flex; align-items:center; justify-content:center; gap:1rem; flex-wrap:wrap;
         padding:.75rem 0 1.25rem; font-family:var(--mono); }
  button { font:inherit; font-family:var(--mono); font-size:1rem; color:var(--deep);
           background:var(--paper); border:0; padding:.4rem .9rem; cursor:pointer; }
  button:disabled { opacity:.35; cursor:default; }
  .dots { display:flex; gap:.5rem; flex-wrap:wrap; justify-content:center; }
  .dots button { padding:0; width:.85rem; height:.85rem; border-radius:50%;
                 background:transparent; border:1.5px solid var(--mute); }
  .dots button[aria-current="true"] { background:var(--gold); border-color:var(--gold); }
  .count { color:var(--mute); font-size:.85rem; min-width:4rem; text-align:center; }
  :focus-visible { outline:2px solid var(--gold); outline-offset:2px; }
  a { color:var(--gold); }
  .foot { text-align:center; font-family:var(--mono); font-size:.75rem; color:var(--mute);
          padding-bottom:1rem; }

  /* 375px. The stage becomes a keyboard-walkable scroll box at a fixed 720px, which is
     0.64 of design width: Label 26 renders at 16.6px and Note 22 at 14.1px, clearing the
     design record's 14px mono floor. The focus ring is drawn INSIDE (Ledger's graft on
     the dimensions matrix) so it can never be clipped at the scroll edge. */
  @media (max-width:760px) {
    .deck { padding:1rem .75rem 0; }
    .stage { overflow-x:auto; display:block; }
    .stage svg { width:720px; max-width:none; max-height:none; }
    .stage:focus-visible { outline-offset:-2px; }
  }

/* Print: a deck is a card viewer, so printing it naively emits one page showing whichever
   card is current. These rules unstack the cards and break a page between them. The first
   attempt named only .plane and missed .plate entirely — two of the five decks use the other
   name — and it left the stage clipping its overflow, so even the decks it did match
   collapsed to two pages. Screen behaviour is untouched. */
@media print {
  .dots, .nav, button, .foot { display: none !important; }
  html, body { background: #081a35 !important; height: auto !important;
    -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .deck, .stage { height: auto !important; min-height: 0 !important; max-height: none !important;
    overflow: visible !important; display: block !important; position: static !important; }
  .plane, .plate, .title {
    display: block !important; visibility: visible !important; position: static !important;
    opacity: 1 !important; height: auto !important; max-height: none !important;
    overflow: visible !important; page-break-after: always; break-after: page;
    margin: 0 0 4mm; inset: auto !important; }
  .plane svg, .plate svg, .stage > svg {
    width: 100% !important; height: auto !important; max-height: 165mm; display: block; }
  .stage > svg { page-break-after: always; break-after: page; }
  .cap, .caption { display: block !important; visibility: visible !important; }
  /* the printed timeline shows every lane named, not one lane and six rows of grey dots */
  .plane .pt .plabel { opacity: 1 !important; }
  .plane .pt .ptag { opacity: 0 !important; }
}
</style>
</head>
<body>
<div class="deck">
  <div class="stage" id="stage" tabindex="0" role="group" aria-roledescription="slide deck"
       aria-label="The Object Museum, an audience deck. Use the left and right arrow keys.">

    <!-- PLANE 1 — the day-timeline, seven hero lanes. SERIES when one lane is lit;
         FIELD when all seven are assembled. -->
    <svg class="plane" id="p-hours" viewBox="0 0 1120 630" role="img"
         aria-labelledby="p-hours-t p-hours-d">
      <title id="p-hours-t">The day-timeline: seven hero objects across the hours of 16 June 1904</title>
      <desc id="p-hours-d">A lane for each of seven objects, running left to right from 8 a.m. to
        2 a.m. A mark on a lane is one station. The lanes, top to bottom, are the lemon soap
        (11 stations), Stephen's wages (12), Mr Deasy's letter (8), the Elijah throwaway (9),
        Plumtree's potted meat (8), Bloom's latchkey, absent (5), and Martha's letter (10).
        One lane at a time is drawn heavy and named; the rest are dimmed and unlabelled.</desc>
      <rect x="32" y="24" width="1056" height="582" fill="#0b2140"/>
      <text class="reg" x="64" y="78">8 A.M. TO 2 A.M. · SEVEN HERO OBJECTS</text>
      <line class="hair" x1="64" y1="100" x2="1056" y2="100"/>
      <text class="ttl" x="64" y="140">The day-timeline</text>

      <!-- the hours: four ticks and four gridlines -->
      <g class="reg">
        <text x="444" y="180" text-anchor="end">8 A.M.</text>
        <text x="579.2" y="180" text-anchor="middle">NOON</text>
        <text x="706.3" y="180" text-anchor="middle">4 P.M.</text>
        <text x="960.6" y="180" text-anchor="middle">MIDNIGHT</text>
      </g>
      <line class="hair" x1="452" y1="196" x2="1056" y2="196"/>
      <g class="trace">
        <line x1="579.2" y1="210" x2="579.2" y2="546"/>
        <line x1="706.3" y1="210" x2="706.3" y2="546"/>
        <line x1="833.5" y1="210" x2="833.5" y2="546"/>
        <line x1="960.6" y1="210" x2="960.6" y2="546"/>
      </g>
      <!-- the one gold element of the assembled card: the 2 a.m. rule they all run into -->
      <line class="gbear" id="converge" x1="1024.2" y1="212" x2="1024.2" y2="536"/>

      <g class="pt" id="obj-soap">
        <line class="lane" x1="523.3" y1="236" x2="1024.2" y2="236"/>
        <circle class="dot" cx="523.3" cy="236"/><circle class="dot" cx="536.8" cy="236"/><circle class="dot" cx="547.4" cy="236"/><circle class="dot" cx="571.5" cy="236"/>
        <circle class="dot" cx="595.5" cy="236"/><circle class="dot" cx="642.7" cy="236"/><circle class="dot" cx="865.3" cy="236"/><circle class="dot" cx="960.6" cy="236"/>
        <circle class="dot" cx="967.4" cy="236"/><circle class="dot" cx="992.4" cy="236"/><circle class="dot last" cx="1024.2" cy="236"/>
        <text class="lab plabel" x="424" y="245" text-anchor="end">the lemon soap</text>
        <text class="note ptag" x="424" y="273" text-anchor="end">11 stations</text>
      </g>
      <g class="pt" id="obj-wages">
        <line class="lane" x1="452" y1="282" x2="1024.2" y2="282"/>
        <circle class="dot" cx="452" cy="282"/><circle class="dot" cx="515.6" cy="282"/><circle class="dot" cx="547.4" cy="282"/><circle class="dot" cx="610.9" cy="282"/>
        <circle class="dot" cx="642.7" cy="282"/><circle class="dot" cx="897.1" cy="282"/><circle class="dot" cx="928.8" cy="282"/><circle class="dot" cx="960.6" cy="282"/>
        <circle class="dot" cx="977" cy="282"/><circle class="dot" cx="992.4" cy="282"/><circle class="dot" cx="999.2" cy="282"/><circle class="dot last" cx="1024.2" cy="282"/>
        
        <text class="lab plabel" x="424" y="291" text-anchor="end">Stephen's wages</text>
        <text class="note ptag" x="424" y="319" text-anchor="end">12 stations</text>
      </g>
      <g class="pt" id="obj-deasy">
        <line class="lane" x1="515.6" y1="328" x2="992.4" y2="328"/>
        <circle class="dot" cx="515.6" cy="328"/><circle class="dot" cx="547.4" cy="328"/><circle class="dot" cx="595.5" cy="328"/><circle class="dot" cx="642.7" cy="328"/>
        <circle class="dot" cx="738.1" cy="328"/><circle class="dot" cx="897.1" cy="328"/><circle class="dot" cx="960.6" cy="328"/><circle class="dot last" cx="992.4" cy="328"/>
        
        <text class="lab plabel" x="424" y="337" text-anchor="end">Mr Deasy's letter</text>
        <text class="note ptag" x="424" y="365" text-anchor="end">8 stations</text>
      </g>
      <g class="pt" id="obj-elijah">
        <line class="lane" x1="610.9" y1="374" x2="1024.2" y2="374"/>
        <circle class="dot" cx="610.9" cy="374"/><circle class="dot" cx="617.7" cy="374"/><circle class="dot" cx="623.5" cy="374"/><circle class="dot" cx="674.5" cy="374"/>
        <circle class="dot" cx="681.3" cy="374"/><circle class="dot" cx="690.9" cy="374"/><circle class="dot" cx="706.3" cy="374"/><circle class="dot" cx="960.6" cy="374"/>
        <circle class="dot last" cx="1024.2" cy="374"/>
        <text class="lab plabel" x="424" y="383" text-anchor="end">the Elijah throwaway</text>
        <text class="note ptag" x="424" y="411" text-anchor="end">9 stations</text>
      </g>
      <g class="pt" id="obj-potted">
        <line class="lane" x1="515.6" y1="420" x2="1048.3" y2="420"/>
        <circle class="dot" cx="515.6" cy="420"/><circle class="dot" cx="616.7" cy="420"/><circle class="dot" cx="627.3" cy="420"/><circle class="dot" cx="960.6" cy="420"/>
        <circle class="dot" cx="1031.9" cy="420"/><circle class="dot" cx="1034.8" cy="420"/><circle class="dot" cx="1045.4" cy="420"/><circle class="dot last" cx="1048.3" cy="420"/>
        
        <text class="lab plabel" x="424" y="429" text-anchor="end">Plumtree's potted meat</text>
        <text class="note ptag" x="424" y="457" text-anchor="end">8 stations</text>
      </g>
      <g class="pt" id="obj-latch">
        <line class="lane" x1="459.7" y1="466" x2="1040.6" y2="466"/>
        <circle class="dot" cx="459.7" cy="466"/><circle class="dot" cx="523.3" cy="466"/><circle class="dot" cx="1024.2" cy="466"/><circle class="dot" cx="1027.1" cy="466"/>
        <circle class="dot last" cx="1040.6" cy="466"/>
        <text class="lab plabel" x="424" y="475" text-anchor="end">Bloom's latchkey (absent)</text>
        <text class="note ptag" x="424" y="503" text-anchor="end">5 stations</text>
      </g>
      <g class="pt" id="obj-martha">
        <line class="lane" x1="452" y1="512" x2="1024.2" y2="512"/>
        <circle class="dot" cx="452" cy="512"/><circle class="dot" cx="515.6" cy="512"/><circle class="dot" cx="520.4" cy="512"/><circle class="dot" cx="563.7" cy="512"/>
        <circle class="dot" cx="610.9" cy="512"/><circle class="dot" cx="706.3" cy="512"/><circle class="dot" cx="721.7" cy="512"/><circle class="dot" cx="849.9" cy="512"/>
        <circle class="dot" cx="960.6" cy="512"/><circle class="dot last" cx="1024.2" cy="512"/>
        <text class="lab plabel" x="424" y="521" text-anchor="end">Martha's letter</text>
        <text class="note ptag" x="424" y="549" text-anchor="end">10 stations</text>
      </g>
      <text class="note" x="64" y="580">One lane to an object; one mark to a station</text>
      <text class="note" x="1056" y="580" text-anchor="end">01 · OBJECT MUSEUM</text>
    </svg>

    <!-- PLANE 2 — the census. FIELD: thirty-two cases, ranked, one lit. -->
    <svg class="plane" id="p-census" viewBox="0 0 1120 630" role="img"
         aria-labelledby="p-census-t p-census-d">
      <title id="p-census-t">The census: thirty-two objects, 301 stations, ranked by station count</title>
      <desc id="p-census-d">Thirty-two named cases in two ranked columns, each with its station
        count and a rule whose length is that count. The ranking runs from Stephen's ashplant
        at 21 stations down to the seedcake on Howth and the torn Gold Cup betting tickets at
        2 each. The longest rule, Stephen's ashplant, is drawn lit with a gold mark at its tip.</desc>
      <rect x="32" y="24" width="1056" height="582" fill="#0b2140"/>
      <text class="reg" x="64" y="78">THIRTY-TWO CASES · 301 STATIONS</text>
      <line class="hair" x1="64" y1="100" x2="1056" y2="100"/>
      <text class="ttl" x="64" y="140">The census</text>
      <g>
        <rect fill="#f4efe2" fill-opacity="0.14" x="112" y="159" width="378" height="27"/><text class="lab" x="94" y="180" text-anchor="end">21</text><text class="lab" x="122" y="180">Stephen's ashplant</text><circle class="gild" cx="490" cy="172" r="8"/>
        <rect fill="#f4efe2" fill-opacity="0.14" x="112" y="187" width="288" height="21"/><text class="note" x="94" y="204" text-anchor="end">16</text><text class="note" x="122" y="204">Bloom's high grade hat</text>
        <rect fill="#f4efe2" fill-opacity="0.14" x="112" y="211" width="288" height="21"/><text class="note" x="94" y="228" text-anchor="end">16</text><text class="note" x="122" y="228">the Freeman's Journal</text>
        <rect fill="#f4efe2" fill-opacity="0.14" x="112" y="235" width="270" height="21"/><text class="note" x="94" y="252" text-anchor="end">15</text><text class="note" x="122" y="252">Stephen's Latin Quarter hat</text>
        <rect fill="#f4efe2" fill-opacity="0.14" x="112" y="259" width="270" height="21"/><text class="note" x="94" y="276" text-anchor="end">15</text><text class="note" x="122" y="276">the Keyes ad cutting</text>
        <rect fill="#f4efe2" fill-opacity="0.14" x="112" y="283" width="252" height="21"/><text class="note" x="94" y="300" text-anchor="end">14</text><text class="note" x="122" y="300">Sweets of Sin</text>
        <rect fill="#f4efe2" fill-opacity="0.14" x="112" y="307" width="234" height="21"/><text class="note" x="94" y="324" text-anchor="end">13</text><text class="note" x="122" y="324">the Agendath Netaim flyer</text>
        <rect fill="#f4efe2" fill-opacity="0.14" x="112" y="331" width="216" height="21"/><text class="note" x="94" y="348" text-anchor="end">12</text><text class="note" x="122" y="348">Stephen's wages</text>
        <rect fill="#f4efe2" fill-opacity="0.14" x="112" y="355" width="198" height="21"/><text class="note" x="94" y="372" text-anchor="end">11</text><text class="note" x="122" y="372">Molly's uncollected lotion</text>
        <rect fill="#f4efe2" fill-opacity="0.14" x="112" y="379" width="198" height="21"/><text class="note" x="94" y="396" text-anchor="end">11</text><text class="note" x="122" y="396">the lemon soap</text>
        <rect fill="#f4efe2" fill-opacity="0.14" x="112" y="403" width="180" height="21"/><text class="note" x="94" y="420" text-anchor="end">10</text><text class="note" x="122" y="420">the brown macintosh</text>
        <rect fill="#f4efe2" fill-opacity="0.14" x="112" y="427" width="180" height="21"/><text class="note" x="94" y="444" text-anchor="end">10</text><text class="note" x="122" y="444">Martha Clifford's letter</text>
        <rect fill="#f4efe2" fill-opacity="0.14" x="112" y="451" width="180" height="21"/><text class="note" x="94" y="468" text-anchor="end">10</text><text class="note" x="122" y="468">the U.p: up postcard</text>
        <rect fill="#f4efe2" fill-opacity="0.14" x="112" y="475" width="162" height="21"/><text class="note" x="94" y="492" text-anchor="end">9</text><text class="note" x="122" y="492">the Jacobs' biscuit tin</text>
        <rect fill="#f4efe2" fill-opacity="0.14" x="112" y="499" width="162" height="21"/><text class="note" x="94" y="516" text-anchor="end">9</text><text class="note" x="122" y="516">the Elijah throwaway</text>
        <rect fill="#f4efe2" fill-opacity="0.14" x="112" y="523" width="162" height="21"/><text class="note" x="94" y="540" text-anchor="end">9</text><text class="note" x="122" y="540">the blind stripling's cane</text>
        <rect fill="#f4efe2" fill-opacity="0.14" x="584" y="163" width="144" height="21"/><text class="note" x="566" y="180" text-anchor="end">8</text><text class="note" x="594" y="180">the shrivelled potato</text>
        <rect fill="#f4efe2" fill-opacity="0.14" x="584" y="187" width="144" height="21"/><text class="note" x="566" y="204" text-anchor="end">8</text><text class="note" x="594" y="204">the Henry Flower card</text>

      tag:"18 episodes · episode 15 holds 55, episode 17 holds 34, episode 2 holds 2" },

      tag:"11 stations · Sweny's counter to the kitchen sink · fourpence, still unpaid" },
    { kind:"work", id:"obj-wages",  name:"Stephen's wages",          tag:"12 stations · 8 a.m. to 2 a.m." },
    { kind:"fig",  plane:"p-wages",    name:"Three pounds twelve, and what is left of it",
      tag:"two notes, a sovereign, two crowns, two shillings · £3-12-0 at 10 a.m. · £1-7-0 at 2 a.m." },
    { kind:"work", id:"obj-deasy",  name:"Mr Deasy's letter",        tag:"8 stations · 10 a.m. to 1 a.m." },
    { kind:"work", id:"obj-elijah", name:"the Elijah throwaway",     tag:"9 stations · 1 p.m. to 2 a.m." },
    { kind:"fig",  plane:"p-liffey",   name:"The throwaway on the Liffey",
      tag:"9 stations · four of them on the Liffey · O'Connell bridge to the sea, ~1 p.m. to ~4 p.m." },
    { kind:"work", id:"obj-potted", name:"Plumtree's potted meat",   tag:"8 stations · 10 a.m. to the small hours" },
    { kind:"work", id:"obj-latch",  name:"Bloom's latchkey (absent)",tag:"5 stations · 8:15 a.m. to 2:30 a.m." },
    { kind:"fig",  plane:"p-keys",     name:"Two instruments of tenure",
      tag:"the Martello tower key, 8 stations · Bloom's latchkey, 5 stations, never on the page" },
    { kind:"work", id:"obj-martha", name:"Martha's letter",          tag:"10 stations · 8 a.m. to 2 a.m." },
    { kind:"fig",  plane:"p-hat",      name:"Bloom's high grade hat, and the card behind the band",
      tag:"the hat, 16 stations · the Henry Flower card, 8 stations · Plasto's, 1 Great Brunswick street" },
    { kind:"fig",  plane:"p-ash",      name:"Stephen's ashplant",
      tag:"21 stations, the longest case · 8:30 a.m. to 2 a.m. · ten of them between midnight and one" },

      tag:"ten objects at their last stations · 2 a.m. to 2:40 a.m." },

  ];
  var pts = ["obj-soap","obj-wages","obj-deasy","obj-elijah","obj-potted","obj-latch","obj-martha"];
  var i = 0;
  var stage = document.getElementById("stage");
  var caption = document.getElementById("caption");
  var capName = document.getElementById("cap-name");
  var capTag = document.getElementById("cap-tag");
  var prev = document.getElementById("prev");
  var next = document.getElementById("next");
  var count = document.getElementById("count");
  var dotsWrap = document.getElementById("dots");
  var planes = document.querySelectorAll(".plane");

  // build dots. A plain nav of buttons carrying aria-current, not a tablist: the deck has
  // no tabpanels, and the honest control passes where the borrowed pattern did not.
  CARDS.forEach(function(c, n){
    var d = document.createElement("button");
    d.setAttribute("aria-label","Card " + (n+1));
    d.addEventListener("click", function(){ go(n); });
    dotsWrap.appendChild(d);
  });
  var dots = dotsWrap.querySelectorAll("button");

  function render(){
    var c = CARDS[i];
    var planeId = c.plane || "p-hours";
    Array.prototype.forEach.call(planes, function(p){
      p.classList.toggle("show", p.id === planeId);
    });
    pts.forEach(function(id){
      var el = document.getElementById(id);
      var on = (c.kind === "all") || (c.kind === "work" && c.id === id);
      el.classList.toggle("on", on);
    });
    // the assembled card re-composes the timeline rather than lighting it seven times
    stage.classList.toggle("assembled", c.kind === "all");
    if (c.kind === "title") {
      caption.classList.add("hidden");
    } else {
      caption.classList.remove("hidden");
      capName.textContent = c.name;
      capTag.textContent = c.tag;
    }
    prev.disabled = (i === 0);
    next.disabled = (i === CARDS.length - 1);
    count.textContent = (i+1) + " / " + CARDS.length;
    dots.forEach(function(d, n){
      if (n === i) { d.setAttribute("aria-current","true"); }
      else { d.removeAttribute("aria-current"); }
    });
  }
  function go(n){ i = Math.max(0, Math.min(CARDS.length - 1, n)); render(); }

  prev.addEventListener("click", function(){ go(i-1); });
  next.addEventListener("click", function(){ go(i+1); });
  // bound to the stage, not the document: a document-level handler captured the arrow keys
  // globally and fought a screen reader's browse mode. The stage already carries tabindex.
  stage.addEventListener("keydown", function(e){
    if (e.key === "ArrowRight" || e.key === "PageDown") { go(i+1); e.preventDefault(); }
    else if (e.key === "ArrowLeft" || e.key === "PageUp") { go(i-1); e.preventDefault(); }
    else if (e.key === "Home") { go(0); e.preventDefault(); }
    else if (e.key === "End") { go(CARDS.length-1); e.preventDefault(); }
  });
  render();
})();
</script>
