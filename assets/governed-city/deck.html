<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Governed City &#8212; the deck</title>
<style>
  /* Dimension 3's presentation register: the audience deck, rebuilt to THE VITRINE
     (ratified 20 July 2026, after the author's verdict that the audience presentations
     were poor). Every card is one object under one light: the subject is drawn, the room
     is a trace, and gold is the light &#8212; used once per plate and never on the ambient
     layer. Cards carry identity only &#8212; a name, an hour, an episode, a count &#8212;
     never the argument (C-19). Nothing is fetched: every mark is drawn here.
     THE SYSTEM, constant across the deck family:
       canvas    1120 &#215; 630, one viewBox unit = one CSS pixel at design width
       bands     register 48&#8211;90 (baseline 78) &#183; title 90&#8211;160 (140)
                 &#183; stage 160&#8211;552 &#183; foot 552&#8211;590 (580); left margin x=64
       type      datum 96 serif &#183; title 44 serif &#183; label 26 mono
                 &#183; register 24 mono UPPER &#183; note 22 mono
       stroke    hair 1.5 &#183; draw 4 &#183; bear 10 (ratio 1 : 2.5 : 6)
       tone      ground #081a35 &#183; plate #0b2140 &#183; trace paper .14
                 &#183; ambient mute .55 (3.83:1) &#183; subject paper (13.90:1)
                 &#183; accent gold (7.57:1)
       marks     ambient r=5, lit r=11 &#183; solid = present, ring = recalled,
                 diamond = hallucinated
     No animation, so prefers-reduced-motion is honoured by construction: the scale-ups
     are instantaneous state changes and carry no transition. */
  :root {
    --deep:#081a35; --plate:#0b2140; --paper:#f4efe2; --gold:#dfa93f; --mute:#b9c3d6;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
  }
  *,*::before,*::after { box-sizing:border-box; }
  html,body { margin:0; padding:0; height:100%; background:var(--deep); color:var(--paper); }
  body { font-family:var(--serif); display:flex; flex-direction:column; min-height:100vh; }
  .deck { flex:1; display:flex; flex-direction:column; max-width:76rem; width:100%;
          margin-inline:auto; padding:1rem 3rem 0; }
  .stage { position:relative; flex:1; display:flex; align-items:center; justify-content:center; }
  svg { display:block; width:100%; height:auto; max-height:74vh; }
  /* only one drawn surface is visible at a time */
  .stage.plated > svg { visibility:hidden; }
  .plate { position:absolute; inset:0; display:none; background:var(--deep); }
  .plate.show { display:flex; align-items:center; justify-content:center; }

  /* THE FIVE TYPE SIZES. Nothing in the drawn layer goes below 22. */
  .pl-dat  { font-family:var(--serif); font-size:96px; fill:var(--paper); }
  .pl-ttl  { font-family:var(--serif); font-size:44px; fill:var(--paper); }
  .pl-lab  { font-family:var(--mono); font-size:26px; fill:var(--paper); }
  .pl-reg  { font-family:var(--mono); font-size:24px; letter-spacing:.16em; fill:var(--paper); }
  .pl-note { font-family:var(--mono); font-size:22px; letter-spacing:.04em;
             fill:var(--mute); fill-opacity:.55; }
  .pl-badge{ font-family:var(--mono); font-size:22px; letter-spacing:.16em;
             fill:var(--mute); fill-opacity:.55; }
  /* the tone classes follow the size classes, so a lit element wins the cascade */
  .t-amb { fill:var(--mute); fill-opacity:.55; }
  .t-sub { fill:var(--paper); fill-opacity:1; }
  .t-acc { fill:var(--gold); fill-opacity:1; }
  /* an axis label that names the lit row or column steps up a size and into subject tone;
     everything unlit stays ambient and unnamed */
  .pl-note.on { font-size:26px; fill:var(--paper); fill-opacity:1; }

  /* the matrix marks: ambient hum by default, lit by the card */
  .cell .m { fill:var(--mute); fill-opacity:.55; }
  .cell .ring { fill:none; stroke:var(--mute); stroke-opacity:.55; stroke-width:1.5; }
  .cell.on .m { fill:var(--paper); fill-opacity:1;
                transform:scale(2.2); transform-box:fill-box; transform-origin:center; }
  .cell.on .ring { fill:none; stroke:var(--paper); stroke-opacity:1; }

  /* the caption reads the current card &#8212; identity only. The name is kept in the DOM
     for aria-live and hidden visually, because the plate already draws its own title. */
  .caption { min-height:2.4rem; text-align:center; padding:.5rem 0 .25rem; }
  .caption .cname { position:absolute; width:1px; height:1px; margin:-1px; padding:0;
                    overflow:hidden; clip-path:inset(50%); white-space:nowrap; border:0; }
  .caption .ctag { font-family:var(--mono); color:var(--mute); font-size:.9rem;
                   letter-spacing:.04em; display:block; }
  .caption.hidden { visibility:hidden; }
  /* controls */
  .bar { display:flex; align-items:center; justify-content:center; gap:1rem;
         padding:.75rem 0 1.25rem; font-family:var(--mono); }
  button { font:inherit; font-family:var(--mono); font-size:1rem; color:var(--deep);
           background:var(--paper); border:0; padding:.4rem .9rem; cursor:pointer; }
  button:disabled { opacity:.35; cursor:default; }
  .dots { display:flex; flex-wrap:wrap; justify-content:center; gap:.5rem; }
  .dots button { padding:0; width:.85rem; height:.85rem; border-radius:50%;
                 background:transparent; border:1.5px solid var(--mute); }
  .dots button[aria-current="true"] { background:var(--gold); border-color:var(--gold); }
  .count { color:var(--mute); font-size:.85rem; min-width:4rem; text-align:center; }
  :focus-visible { outline:2px solid var(--gold); outline-offset:2px; }
  a { color:var(--gold); }
  .foot { text-align:center; font-family:var(--mono); font-size:.75rem; color:var(--mute);
          padding-bottom:1rem; }

/* Small screens: the plate does not reflow &#8212; a drawn plate is a fixed surface. It is
   held at 720px inside a keyboard-walkable scroll box, which keeps the mono factual layer
   at 14.1px and the labels at 16.6px (the design record's 14px mono floor). The focus ring
   is drawn INSIDE the box (Ledger's graft on the dimensions matrix) so an edge can never
   clip it. */
@media (max-width:760px) {
  .deck { padding:.5rem .75rem 0; }
  .stage { overflow-x:auto; overflow-y:hidden; justify-content:flex-start; }
  .stage > svg { width:720px; max-width:none; max-height:none; }
  .plate { right:auto; width:720px; }
  .plate.show { justify-content:flex-start; }
  .plate svg { width:720px; max-width:none; max-height:none; }
  .stage:focus-visible { outline-offset:-2px; }
}

/* Print: a deck is a card viewer, so printing it naively emits one page showing whichever
   card is current. These rules unstack the cards and break a page between them. The first
   attempt named only .plane and missed .plate entirely &#8212; two of the five decks use the
   other name &#8212; and it left the stage clipping its overflow, so even the decks it did
   match collapsed to two pages. Screen behaviour is untouched. */
@media print {
  .dots, .nav, button, .foot { display: none !important; }
  html, body { background: #081a35 !important; height: auto !important;
    -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .deck, .stage { height: auto !important; min-height: 0 !important; max-height: none !important;
    overflow: visible !important; display: block !important; position: static !important; }
  .plane, .plate, .title {
    display: block !important; visibility: visible !important; position: static !important;
    opacity: 1 !important; height: auto !important; max-height: none !important;
    overflow: visible !important; page-break-after: always; break-after: page;
    margin: 0 0 4mm; inset: auto !important; width: auto !important; }
  .stage.plated > svg { visibility: visible !important; }
  .plane svg, .plate svg, .stage > svg {
    width: 100% !important; height: auto !important; max-height: 165mm; display: block;
    visibility: visible !important; }
  .stage > svg { page-break-after: always; break-after: page; }
  .cap, .caption { display: block !important; visibility: visible !important; }
  .caption .cname { position: static !important; width: auto !important; height: auto !important;
    margin: 0 !important; clip-path: none !important; }
}
</style>
</head>

<title id="pm-t">The instruments of rule, thirteen by eighteen</title>
<desc id="pm-d">A grid of thirteen rows and eighteen columns. Each row is an instrument of rule: the police, the garrison, Dublin Castle, the cavalcade, the courts, the gallows, the informer, the Church, the schoolroom, the King&#8217;s English, the Crown in effigy, the paperwork, the parliament. Each column is one of the eighteen episodes, running from eight in the morning to deep night. A hundred and sixty marks sit in the grid: eighty-eight filled dots for present, sixty-two open rings for recalled or reported, ten diamonds for hallucinated. The garrison row and the King&#8217;s English row carry a mark in every column; the twelfth and fifteenth columns are the fullest. When a card names an hour or an instrument, that column or row is drawn bright and a gold rule is laid along it.</desc>

  <p class="caption hidden" id="caption" aria-live="polite">
    <span class="cname" id="cap-name"></span>
    <span class="ctag" id="cap-tag"></span>
  </p>

  <div class="bar">
    <button id="prev" aria-label="Previous card">&#8249; Prev</button>
    <nav class="dots" id="dots" aria-label="Cards"></nav>
    <button id="next" aria-label="Next card">Next &#8250;</button>
    <span class="count" id="count"></span>
  </div>

<p class="foot">An audience deck. 160 marks &#8212; 88 present, 62 recalled or reported,
10 hallucinated &#8212; across all eighteen episodes, none of them empty.
Dimension 3 &#183; <a href="../governed-city/instruments.html">the diagram</a>.</p>

<script>
(function(){
  // Cards: identity labels only &#8212; the argument itself is the presenter's, off-site.
  var CARDS = [
    { kind:"title", name:"The Governed City", tag:"thirteen instruments \u00b7 eighteen episodes" },
    { kind:"matrix", name:"The instruments of rule", tag:"160 marks \u00b7 88 present \u00b7 13 instruments \u00b7 18 episodes" },
    { kind:"plate", id:"pl-bars", name:"Present marks, episode by episode",
      tag:"88 present \u00b7 none of the eighteen empty \u00b7 peak Wandering Rocks, 11" },
    { kind:"col", eps:[10], name:"Wandering Rocks \u00b7 episode 10", tag:"~3 p.m. \u00b7 12 marks lit \u00b7 11 present, the day's peak" },
    { kind:"plate", id:"pl-cavalcade", name:"The viceregal cavalcade",
      tag:"6 episodes \u00b7 ~1:15 p.m. to ~9 p.m. \u00b7 Phoenix Park to Ballsbridge" },
    { kind:"col", eps:[12], name:"Cyclops \u00b7 episode 12", tag:"~5 p.m. \u00b7 11 instruments lit \u00b7 1 hallucinated" },
    { kind:"col", eps:[15], name:"Circe \u00b7 episode 15", tag:"~midnight \u00b7 12 instruments lit \u00b7 8 hallucinated" },
    { kind:"state", state:"hallucinated", name:"The hallucinated marks", tag:"10 marks \u00b7 Circe 8 \u00b7 Cyclops 1 \u00b7 Ithaca 1" },
    { kind:"col", eps:[12,15], name:"Cyclops & Circe", tag:"~5 p.m. & ~midnight \u00b7 23 marks lit \u00b7 9 hallucinated" },
    { kind:"row", inst:2, name:"Dublin Castle", tag:"the seat of rule \u00b7 11 episodes \u00b7 7 recalled, 3 present, 1 hallucinated" },
    { kind:"row", inst:6, name:"The informer and his reputation", tag:"12 episodes \u00b7 6 recalled, 6 present" },
    { kind:"plate", id:"pl-kelleher", name:"Corny Kelleher",
      tag:"five sightings \u00b7 ~9:50 a.m. to ~12:50 a.m. \u00b7 episodes 5, 6, 8, 10, 15" },
    { kind:"plate", id:"pl-garrison", name:"The garrison, first hour and last",
      tag:"episode 1, ~8 a.m. \u00b7 episode 15, ~12:50 a.m. \u00b7 episode 18, deep night" },
    { kind:"row", inst:1, name:"The garrison, on the plane", tag:"18 episodes, none without it \u00b7 7 present, 11 recalled" },
    { kind:"row", inst:9, name:"The King's English", tag:"18 episodes \u00b7 18 present \u00b7 none recalled, none hallucinated" },
    { kind:"plate", id:"pl-crown", name:"The Crown in effigy",
      tag:"coin, mailcar, pillar, furled flag \u00b7 11 episodes \u00b7 in person once, hallucinated" },
    { kind:"plate", id:"pl-paperwork", name:"The paperwork of rule",
      tag:"10 episodes \u00b7 9 present \u00b7 the lost property office to the ordnance survey" },
    { kind:"plate", id:"pl-gallows", name:"The gallows and the jail",
      tag:"11 episodes \u00b7 2 present, 7 recalled, 2 hallucinated" },
    { kind:"all", name:"The governed city, assembled", tag:"13 instruments across 18 episodes \u00b7 all 160 marks lit" }
  ];
  // the matrix's geometry, so the gold locator can be laid on the lit column or row
  var COLX = [376,415.1,454.1,493.2,532.2,571.3,610.4,649.4,688.5,727.5,766.6,805.6,844.7,883.8,922.8,961.9,1000.9,1040];
  var ROWY = [224,250,276,302,328,354,380,406,432,458,484,510,536];

  var cells = Array.prototype.slice.call(document.querySelectorAll(".cell"));
  var plates = Array.prototype.slice.call(document.querySelectorAll(".plate"));
  var axEp = Array.prototype.slice.call(document.querySelectorAll(".ep"));
  var axInst = Array.prototype.slice.call(document.querySelectorAll(".inst"));
  // read each mark's A3 state off the glyph it was drawn with, once
  cells.forEach(function(cell){
    var m = cell.querySelector(".m");
    cell.setAttribute("data-state", m.classList.contains("dot") ? "present"
      : m.classList.contains("ring") ? "recalled" : "hallucinated");
  });
  var i = 0;
  var stage = document.getElementById("stage");
  var title = document.getElementById("title");
  var caption = document.getElementById("caption");
  var capName = document.getElementById("cap-name");
  var capTag = document.getElementById("cap-tag");
  var prev = document.getElementById("prev");
  var next = document.getElementById("next");
  var count = document.getElementById("count");
  var dotsWrap = document.getElementById("dots");
  var mkAll = document.getElementById("mk-all");
  var mkRow = document.getElementById("mk-row");
  var mkCols = document.getElementById("mk-cols");
  var lgDia = document.getElementById("lg-dia");

  // build dots
  CARDS.forEach(function(c, n){
    var d = document.createElement("button");
    d.setAttribute("aria-label","Card " + (n+1) + ", " + c.name);
    d.addEventListener("click", function(){ go(n); });
    dotsWrap.appendChild(d);
  });
  var dots = Array.prototype.slice.call(dotsWrap.querySelectorAll("button"));

  function lit(c, ep, inst, state){
    if (c.kind === "all") return true;
    if (c.kind === "col") return c.eps.indexOf(ep) >= 0;
    if (c.kind === "row") return inst === c.inst;
    if (c.kind === "state") return state === c.state;
    return false; // title, matrix, plate: nothing lit (the ambient hum)
  }

  // THE ONE GOLD ELEMENT. Focus is made by weight and isolation and only confirmed by
  // gold, so the lit marks go to subject tone and gold is spent once, on the locator that
  // names WHERE the card is looking &#8212; never on the ambient field.
  function locate(c){
    mkAll.setAttribute("visibility", c.kind === "all" ? "visible" : "hidden");
    mkRow.setAttribute("visibility", "hidden");
    while (mkCols.firstChild) mkCols.removeChild(mkCols.firstChild);
    lgDia.setAttribute("fill", "#b9c3d6");
    lgDia.setAttribute("fill-opacity", ".55");
    if (c.kind === "row") {
      mkRow.setAttribute("y1", ROWY[c.inst]);
      mkRow.setAttribute("y2", ROWY[c.inst]);
      mkRow.setAttribute("visibility", "visible");
    } else if (c.kind === "col") {
      c.eps.forEach(function(e){
        var l = document.createElementNS("http://www.w3.org/2000/svg","line");
        l.setAttribute("x1", COLX[e-1]); l.setAttribute("x2", COLX[e-1]);
        l.setAttribute("y1", 213); l.setAttribute("y2", 547);
        l.setAttribute("stroke", "#dfa93f"); l.setAttribute("stroke-width", 10);
        mkCols.appendChild(l);
      });
    } else if (c.kind === "state" && c.state === "hallucinated") {
      lgDia.setAttribute("fill", "#dfa93f");
      lgDia.setAttribute("fill-opacity", "1");
    }
  }

  function render(){
    var c = CARDS[i];
    cells.forEach(function(cell){
      var ep = +cell.getAttribute("data-ep");
      var inst = +cell.getAttribute("data-inst");
      cell.classList.toggle("on", lit(c, ep, inst, cell.getAttribute("data-state")));
    });
    // Reduce, then draw, then name once: an axis label is only spoken when its row or
    // column is the subject.
    axEp.forEach(function(t){
      t.classList.toggle("on", c.kind === "col" && c.eps.indexOf(+t.getAttribute("data-ep")) >= 0);
    });
    axInst.forEach(function(t){
      t.classList.toggle("on", c.kind === "row" && +t.getAttribute("data-inst") === c.inst);
    });
    locate(c);
    plates.forEach(function(p){ p.classList.toggle("show", c.kind === "plate" && p.id === c.id); });
    title.classList.toggle("show", c.kind === "title");
    stage.classList.toggle("plated", c.kind === "plate" || c.kind === "title");
    if (c.kind === "title") {
      caption.classList.add("hidden");
    } else {
      caption.classList.remove("hidden");
      capName.textContent = c.name;
      capTag.textContent = c.tag;
    }
    prev.disabled = (i === 0);
    next.disabled = (i === CARDS.length - 1);
    count.textContent = (i+1) + " / " + CARDS.length;
    dots.forEach(function(d, n){
      if (n === i) d.setAttribute("aria-current", "true"); else d.removeAttribute("aria-current");
    });
  }
  function go(n){ i = Math.max(0, Math.min(CARDS.length - 1, n)); render(); }

  prev.addEventListener("click", function(){ go(i-1); });
  next.addEventListener("click", function(){ go(i+1); });
  // bound to the stage and to the dot bar, not to the document: a global arrow handler
  // fights a screen reader's browse mode.
  function keys(e){
    if (e.key === "ArrowRight" || e.key === "PageDown") { go(i+1); e.preventDefault(); }
    else if (e.key === "ArrowLeft" || e.key === "PageUp") { go(i-1); e.preventDefault(); }
    else if (e.key === "Home") { go(0); e.preventDefault(); }
    else if (e.key === "End") { go(CARDS.length-1); e.preventDefault(); }
  }
  stage.addEventListener("keydown", keys);
  dotsWrap.addEventListener("keydown", keys);
  render();
})();
</script>
