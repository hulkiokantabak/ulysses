<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Governed City &#8212; the deck</title>
<style>
  /* Dimension 3's presentation register: the audience deck. Image cards only, no
     explanations (the presenter's material is kept off the public site &#8212; C-19). Two
     kinds of card share one mechanism. The first is the plane &#8212; the
     instruments-by-episodes matrix, drawn once; each such card lights a subset of its
     cells in gold (a column, a row, a state, or all of it). The second is a drawn plate
     &#8212; an overlay carrying its own inline SVG: a chart, a map, a timeline, an object.
     Drawn imagery is admitted since the design's reversal of 19 July 2026, but the cards
     still carry identity only &#8212; a name, an hour, an episode, a count &#8212; never
     the argument (C-19). Nothing is fetched: every mark is drawn here.
     The 1922 family: deep plate, paper, gold, mono factual layer. No animation, so
     prefers-reduced-motion is honoured by design. */
  :root {
    --deep:#081a35; --paper:#f4efe2; --gold:#dfa93f; --mute:#b9c3d6;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
  }
  *,*::before,*::after { box-sizing:border-box; }
  html,body { margin:0; padding:0; height:100%; background:var(--deep); color:var(--paper); }
  body { font-family:var(--serif); display:flex; flex-direction:column; min-height:100vh; }
  .deck { flex:1; display:flex; flex-direction:column; max-width:74rem; width:100%;
          margin-inline:auto; padding:1rem 1rem 0; }
  .stage { position:relative; flex:1; display:flex; align-items:center; justify-content:center; }
  svg { display:block; width:100%; height:auto; max-height:74vh; }
  /* cells default to muted marks (the ambient hum); JS lights the active column/row */
  .cell .m { fill:var(--mute); }
  .cell .ring { fill:none; stroke:var(--mute); stroke-width:1.5; }
  .cell.on .m { fill:var(--gold); transform:scale(1.55); transform-box:fill-box; transform-origin:center; }
  .cell.on .ring { fill:none; stroke:var(--gold); }
  /* the title card overlays the stage */
  .title { position:absolute; inset:0; display:none; flex-direction:column;
           align-items:center; justify-content:center; text-align:center; }
  .title.show { display:flex; }
  .title h1 { font-size:clamp(2rem,7vw,4rem); margin:0 0 .5rem; letter-spacing:.01em; }
  .title .works { font-family:var(--mono); color:var(--mute); font-size:clamp(.9rem,2.4vw,1.15rem);
                  letter-spacing:.12em; }
  .title .rule { width:8rem; height:3px; background:var(--gold); margin:1.25rem 0; }
  .title .sub { font-style:italic; color:var(--paper); max-width:34ch; font-size:clamp(1rem,2.6vw,1.3rem); }
  /* the drawn plates overlay the stage &#8212; the title card's mechanism, with a ground */
  .plate { position:absolute; inset:0; display:none; background:var(--deep); }
  .plate.show { display:block; }
  .plate svg { width:100%; height:100%; max-height:none; }
  .pl-h { font-family:var(--mono); font-size:15px; fill:var(--paper); letter-spacing:.16em; }
  .pl-l { font-family:var(--mono); font-size:12.5px; fill:var(--mute); letter-spacing:.07em; }
  .pl-n { font-family:var(--mono); font-size:11px; fill:var(--mute); letter-spacing:.05em; }
  .pl-er { font-family:var(--mono); font-size:26px; fill:var(--paper); letter-spacing:.1em; }
  /* the colour classes follow the size classes, so a lit label wins the cascade */
  .pl-gold { fill:var(--gold); }
  .pl-paper { fill:var(--paper); }
  .pl-mute { fill:var(--mute); }
  /* the caption bar reads the current card &#8212; identity only */
  .caption { min-height:3.2rem; text-align:center; padding:.5rem 0 .25rem; }
  .caption .cname { font-size:1.4rem; }
  .caption .ctag { font-family:var(--mono); color:var(--mute); font-size:.9rem; letter-spacing:.04em; display:block; margin-top:.15rem; }
  .caption.hidden { visibility:hidden; }
  /* controls */
  .bar { display:flex; align-items:center; justify-content:center; gap:1rem;
         padding:.75rem 0 1.25rem; font-family:var(--mono); }
  button { font:inherit; font-family:var(--mono); font-size:1rem; color:var(--deep);
           background:var(--paper); border:0; padding:.4rem .9rem; cursor:pointer; }
  button:disabled { opacity:.35; cursor:default; }
  .dots { display:flex; gap:.5rem; }
  .dots button { padding:0; width:.85rem; height:.85rem; border-radius:50%;
                 background:transparent; border:1.5px solid var(--mute); }
  .dots button[aria-current="true"] { background:var(--gold); border-color:var(--gold); }
  .count { color:var(--mute); font-size:.85rem; min-width:4rem; text-align:center; }
  :focus-visible { outline:2px solid var(--gold); outline-offset:2px; }
  a { color:var(--gold); }
  .foot { text-align:center; font-family:var(--mono); font-size:.75rem; color:var(--mute);
          padding-bottom:1rem; }

@media print {
  .dots, .nav, nav, button { display: none !important; }
  .deck, .stage { height: auto !important; min-height: 0 !important; }
  .plane { display: block !important; position: static !important;
           visibility: visible !important; page-break-after: always; margin: 0 0 6mm; }
  .plane svg, .stage > svg { width: 100% !important; height: auto !important; }
  .title { position: static !important; page-break-after: always; }
  body { background: #081a35 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
</style>
</head>

10 hallucinated &#8212; across all eighteen episodes, none of them empty.
Dimension 3 &#183; <a href="../governed-city/instruments.html">the diagram</a>.</p>

<script>
(function(){
  // Cards: identity labels only &#8212; the argument itself is the presenter's, off-site.
  var CARDS = [
    { kind:"title" },
    { kind:"matrix", name:"The instruments of rule", tag:"160 marks · 88 present · 13 instruments · 18 episodes" },
    { kind:"plate", id:"pl-bars", name:"Present marks, episode by episode",
      tag:"88 present · none of the eighteen empty · peak Wandering Rocks, 11" },
    { kind:"col", eps:[10], name:"Wandering Rocks · episode 10", tag:"~3 p.m. · 12 marks lit · 11 present, the day's peak" },
    { kind:"plate", id:"pl-cavalcade", name:"The viceregal cavalcade",
      tag:"6 episodes · ~1:15 p.m. to ~9 p.m. · Phoenix Park to Ballsbridge" },
    { kind:"col", eps:[12], name:"Cyclops · episode 12", tag:"~5 p.m. · 11 instruments lit · 1 hallucinated" },
    { kind:"col", eps:[15], name:"Circe · episode 15", tag:"~midnight · 12 instruments lit · 8 hallucinated" },
    { kind:"state", state:"hallucinated", name:"The hallucinated marks", tag:"10 marks · Circe 8 · Cyclops 1 · Ithaca 1" },
    { kind:"col", eps:[12,15], name:"Cyclops & Circe", tag:"~5 p.m. & ~midnight · 23 marks lit · 9 hallucinated" },
    { kind:"row", inst:2, name:"Dublin Castle", tag:"the seat of rule · 11 episodes · 7 recalled, 3 present, 1 hallucinated" },
    { kind:"row", inst:6, name:"The informer and his reputation", tag:"12 episodes · 6 recalled, 6 present" },
    { kind:"plate", id:"pl-kelleher", name:"Corny Kelleher",
      tag:"five sightings · ~9:50 a.m. to ~12:50 a.m. · episodes 5, 6, 8, 10, 15" },
    { kind:"plate", id:"pl-garrison", name:"The garrison, first hour and last",
      tag:"episode 1, ~8 a.m. · episode 15, ~12:50 a.m. · episode 18, deep night" },
    { kind:"row", inst:1, name:"The garrison, on the plane", tag:"18 episodes, none without it · 7 present, 11 recalled" },
    { kind:"row", inst:9, name:"The King's English", tag:"18 episodes · 18 present · none recalled, none hallucinated" },
    { kind:"plate", id:"pl-crown", name:"The Crown in effigy",
      tag:"coin, mailcar, pillar, furled flag · 11 episodes · in person once, hallucinated" },
    { kind:"plate", id:"pl-paperwork", name:"The paperwork of rule",
      tag:"10 episodes · 9 present · the lost property office to the ordnance survey" },
    { kind:"plate", id:"pl-gallows", name:"The gallows and the jail",
      tag:"11 episodes · 2 present, 7 recalled, 2 hallucinated" },
    { kind:"all", name:"The governed city, assembled", tag:"13 instruments across 18 episodes · all 160 marks lit" }
  ];
  var cells = Array.prototype.slice.call(document.querySelectorAll(".cell"));
  var plates = Array.prototype.slice.call(document.querySelectorAll(".plate"));
  // read each mark's A3 state off the glyph it was drawn with, once
  cells.forEach(function(cell){
    var m = cell.querySelector(".m");
    cell.setAttribute("data-state", m.classList.contains("dot") ? "present"
      : m.classList.contains("ring") ? "recalled" : "hallucinated");
  });
  var i = 0;
  var title = document.getElementById("title");
  var caption = document.getElementById("caption");
  var capName = document.getElementById("cap-name");
  var capTag = document.getElementById("cap-tag");
  var prev = document.getElementById("prev");
  var next = document.getElementById("next");
  var count = document.getElementById("count");
  var dotsWrap = document.getElementById("dots");

  // build dots
  CARDS.forEach(function(c, n){
    var d = document.createElement("button");
    d.setAttribute("role","tab");
    d.setAttribute("aria-label","Card " + (n+1));
    d.addEventListener("click", function(){ go(n); });
    dotsWrap.appendChild(d);
  });
  var dots = dotsWrap.querySelectorAll("button");

  function lit(c, ep, inst, state){
    if (c.kind === "all") return true;
    if (c.kind === "col") return c.eps.indexOf(ep) >= 0;
    if (c.kind === "row") return inst === c.inst;
    if (c.kind === "state") return state === c.state;
    return false; // title, matrix, plate: nothing lit (the ambient hum)
  }

  function render(){
    var c = CARDS[i];
    cells.forEach(function(cell){
      var ep = +cell.getAttribute("data-ep");
      var inst = +cell.getAttribute("data-inst");
      cell.classList.toggle("on", lit(c, ep, inst, cell.getAttribute("data-state")));
    });
    plates.forEach(function(p){ p.classList.toggle("show", c.kind === "plate" && p.id === c.id); });
    title.classList.toggle("show", c.kind === "title");
    if (c.kind === "title") {
      caption.classList.add("hidden");
    } else {
      caption.classList.remove("hidden");
      capName.textContent = c.name;
      capTag.textContent = c.tag;
    }
    prev.disabled = (i === 0);
    next.disabled = (i === CARDS.length - 1);
    count.textContent = (i+1) + " / " + CARDS.length;
    dots.forEach(function(d, n){ d.setAttribute("aria-current", n === i ? "true" : "false"); });
  }
  function go(n){ i = Math.max(0, Math.min(CARDS.length - 1, n)); render(); }

  prev.addEventListener("click", function(){ go(i-1); });
  next.addEventListener("click", function(){ go(i+1); });
  document.addEventListener("keydown", function(e){
    if (e.key === "ArrowRight" || e.key === "PageDown") { go(i+1); e.preventDefault(); }
    else if (e.key === "ArrowLeft" || e.key === "PageUp") { go(i-1); e.preventDefault(); }
    else if (e.key === "Home") { go(0); e.preventDefault(); }
    else if (e.key === "End") { go(CARDS.length-1); e.preventDefault(); }
  });
  render();
})();
</script>
