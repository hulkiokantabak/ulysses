<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Four Odysseys — the deck</title>
<style>
  /* Dimension 16's presentation register: the audience deck. Image cards only, no
     explanations (the presenter's material is kept off the public site — C-19). One
     plane; each card lights one work in gold and reads it across the two axes; the
     last card assembles all four. The 1922 family: deep plate, paper, gold, mono
     factual layer. No animation, so prefers-reduced-motion is honoured by design. */
  :root {
    --deep:#081a35; --paper:#f4efe2; --gold:#dfa93f; --mute:#b9c3d6;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
  }
  *,*::before,*::after { box-sizing:border-box; }
  html,body { margin:0; padding:0; height:100%; background:var(--deep); color:var(--paper); }
  body { font-family:var(--serif); display:flex; flex-direction:column; min-height:100vh; }
  .deck { flex:1; display:flex; flex-direction:column; max-width:70rem; width:100%;
          margin-inline:auto; padding:1rem 1rem 0; }
  .stage { position:relative; flex:1; display:flex; align-items:center; justify-content:center; }
  svg { display:block; width:100%; height:auto; max-height:72vh; }
  /* points default to muted/small; JS lights the active work(s) */
  .pt circle.dot { fill:var(--mute); r:6px; transition:none; }
  .pt.on circle.dot { fill:var(--gold); r:11px; }
  .pt .plabel, .pt .ptag { opacity:0; }
  .pt.on .plabel, .pt.on .ptag { opacity:1; }
  .plabel { font-family:var(--serif); font-size:26px; fill:var(--paper); }
  .ptag { font-family:var(--mono); font-size:15px; fill:var(--mute); }
  .ring { opacity:0; }
  .pt.on .ring { opacity:1; }
  /* the title card overlays the stage */
  .title { position:absolute; inset:0; display:none; flex-direction:column;
           align-items:center; justify-content:center; text-align:center; }
  .title.show { display:flex; }
  .title h1 { font-size:clamp(2rem,7vw,4rem); margin:0 0 .5rem; letter-spacing:.01em; }
  .title .works { font-family:var(--mono); color:var(--mute); font-size:clamp(.9rem,2.4vw,1.15rem);
                  letter-spacing:.12em; }
  .title .rule { width:8rem; height:3px; background:var(--gold); margin:1.25rem 0; }
  .title .sub { font-style:italic; color:var(--paper); max-width:34ch; font-size:clamp(1rem,2.6vw,1.3rem); }
  /* the caption bar reads the current card — identity only */
  .caption { min-height:3.2rem; text-align:center; padding:.5rem 0 .25rem; }
  .caption .cname { font-size:1.4rem; }
  .caption .ctag { font-family:var(--mono); color:var(--mute); font-size:.9rem; letter-spacing:.04em; display:block; margin-top:.15rem; }
  .caption.hidden { visibility:hidden; }
  /* controls */
  .bar { display:flex; align-items:center; justify-content:center; gap:1rem;
         padding:.75rem 0 1.25rem; font-family:var(--mono); }
  button { font:inherit; font-family:var(--mono); font-size:1rem; color:var(--deep);
           background:var(--paper); border:0; padding:.4rem .9rem; cursor:pointer; }
  button:disabled { opacity:.35; cursor:default; }
  .dots { display:flex; gap:.5rem; }
  .dots button { padding:0; width:.85rem; height:.85rem; border-radius:50%;
                 background:transparent; border:1.5px solid var(--mute); }
  .dots button[aria-current="true"] { background:var(--gold); border-color:var(--gold); }
  .count { color:var(--mute); font-size:.85rem; min-width:4rem; text-align:center; }
  :focus-visible { outline:2px solid var(--gold); outline-offset:2px; }
  a { color:var(--gold); }
  .foot { text-align:center; font-family:var(--mono); font-size:.75rem; color:var(--mute);
          padding-bottom:1rem; }
</style>
</head>
<body>
<div class="deck">
  <div class="stage" id="stage" tabindex="0" role="group" aria-roledescription="slide deck"
       aria-label="Four Odysseys, an audience deck. Use the left and right arrow keys.">
    <svg viewBox="0 0 960 560" aria-hidden="true">
      <line x1="120" y1="470" x2="900" y2="470" stroke="#b9c3d6" stroke-width="1"/>
      <line x1="120" y1="470" x2="120" y2="60" stroke="#b9c3d6" stroke-width="1"/>
      <g font-family="ui-monospace,Menlo,Consolas,monospace" font-size="14" fill="#b9c3d6">
        <text x="120" y="496" text-anchor="middle">0%</text>
        <text x="510" y="496" text-anchor="middle">50%</text>
        <text x="900" y="496" text-anchor="middle">100%</text>
        <text x="510" y="528" text-anchor="middle" letter-spacing="2">FIDELITY TO HOMER'S PLOT AND GENRE</text>
        <text x="104" y="444" text-anchor="end">externalized</text>
        <text x="104" y="300" text-anchor="end">medium-high</text>
        <text x="104" y="212" text-anchor="end">high</text>
        <text x="104" y="96" text-anchor="end">maximal</text>
        <text x="40" y="265" text-anchor="middle" transform="rotate(-90 40 265)" letter-spacing="2">INTERIOR ORIENTATION</text>
      </g>
      <g class="pt" id="p-homer">
        <circle class="dot" cx="900" cy="440"/>
        <text class="plabel" x="878" y="424" text-anchor="end">Homer</text>
        <text class="ptag" x="878" y="446" text-anchor="end">the source · oral epic · 100%</text>
      </g>
      <g class="pt" id="p-wilson">
        <circle class="dot" cx="900" cy="208"/>
        <text class="plabel" x="878" y="192" text-anchor="end">Wilson, 2017</text>
        <text class="ptag" x="878" y="214" text-anchor="end">register, not plot · 100%</text>
      </g>
      <g class="pt" id="p-nolan">
        <circle class="ring" cx="666" cy="296" r="18" fill="none" stroke="#dfa93f" stroke-width="2" stroke-dasharray="4 4"/>
        <circle class="dot" cx="666" cy="296"/>
        <text class="plabel" x="666" y="262" text-anchor="middle">Nolan, 2026</text>
        <text class="ptag" x="666" y="334" text-anchor="middle">adds content · ~70% · day-one reviews</text>
      </g>
      <g class="pt" id="p-joyce">
        <circle class="dot" cx="132" cy="92"/>
        <text class="plabel" x="154" y="86">Joyce, 1922</text>
        <text class="ptag" x="154" y="108">genre transformed · ~0%</text>
      </g>
    </svg>
    <div class="title show" id="title">
      <h1>Four Odysseys</h1>
      <div class="works">HOMER · WILSON · NOLAN · JOYCE</div>
      <div class="rule"></div>
      <p class="sub">Two axes usually collapsed into one.</p>
    </div>
  </div>

  <p class="caption hidden" id="caption" aria-live="polite">
    <span class="cname" id="cap-name"></span>
    <span class="ctag" id="cap-tag"></span>
  </p>

  <div class="bar">
    <button id="prev" aria-label="Previous card">‹ Prev</button>
    <div class="dots" id="dots" role="tablist" aria-label="Cards"></div>
    <button id="next" aria-label="Next card">Next ›</button>
    <span class="count" id="count"></span>
  </div>
</div>
<p class="foot">An audience deck. Nolan's placement rests on day-one reviews, not the film.
Dimension 16 · <a href="../four-odysseys/two-axes.html">the chart</a>.</p>

<script>
(function(){
  // Cards: identity labels only — the argument itself is the presenter's, off-site.
  var CARDS = [
    { kind:"title" },
    { kind:"work", id:"p-homer",  name:"Homer",        tag:"the source · externalized interiority · 100% fidelity" },
    { kind:"work", id:"p-wilson", name:"Wilson, 2017", tag:"register, not plot · high interiority · 100% fidelity" },
    { kind:"work", id:"p-nolan",  name:"Nolan, 2026",  tag:"adds content · medium-high · ~70% · day-one reviews" },
    { kind:"work", id:"p-joyce",  name:"Joyce, 1922",  tag:"genre transformed · maximal interiority · ~0% fidelity" },
    { kind:"all",  name:"The four, assembled",         tag:"two axes usually collapsed into one" }
  ];
  var pts = ["p-homer","p-wilson","p-nolan","p-joyce"];
  var i = 0;
  var title = document.getElementById("title");
  var caption = document.getElementById("caption");
  var capName = document.getElementById("cap-name");
  var capTag = document.getElementById("cap-tag");
  var prev = document.getElementById("prev");
  var next = document.getElementById("next");
  var count = document.getElementById("count");
  var dotsWrap = document.getElementById("dots");

  // build dots
  CARDS.forEach(function(c, n){
    var d = document.createElement("button");
    d.setAttribute("role","tab");
    d.setAttribute("aria-label","Card " + (n+1));
    d.addEventListener("click", function(){ go(n); });
    dotsWrap.appendChild(d);
  });
  var dots = dotsWrap.querySelectorAll("button");

  function render(){
    var c = CARDS[i];
    pts.forEach(function(id){
      var el = document.getElementById(id);
      var on = (c.kind === "all") || (c.kind === "work" && c.id === id);
      el.classList.toggle("on", on);
    });
    title.classList.toggle("show", c.kind === "title");
    if (c.kind === "title") {
      caption.classList.add("hidden");
    } else {
      caption.classList.remove("hidden");
      capName.textContent = c.name;
      capTag.textContent = c.tag;
    }
    prev.disabled = (i === 0);
    next.disabled = (i === CARDS.length - 1);
    count.textContent = (i+1) + " / " + CARDS.length;
    dots.forEach(function(d, n){ d.setAttribute("aria-current", n === i ? "true" : "false"); });
  }
  function go(n){ i = Math.max(0, Math.min(CARDS.length - 1, n)); render(); }

  prev.addEventListener("click", function(){ go(i-1); });
  next.addEventListener("click", function(){ go(i+1); });
  document.addEventListener("keydown", function(e){
    if (e.key === "ArrowRight" || e.key === "PageDown") { go(i+1); e.preventDefault(); }
    else if (e.key === "ArrowLeft" || e.key === "PageUp") { go(i-1); e.preventDefault(); }
    else if (e.key === "Home") { go(0); e.preventDefault(); }
    else if (e.key === "End") { go(CARDS.length-1); e.preventDefault(); }
  });
  render();
})();
</script>
</body>
</html>
