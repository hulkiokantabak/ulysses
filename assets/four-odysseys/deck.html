<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Four Odysseys &#8212; the deck</title>
<style>
  /* Dimension 16's presentation register: the audience deck, rebuilt to THE VITRINE
     (design direction ratified 19 July 2026). Every card is one object under one light.
     The room is a trace, the subject is drawn, and gold is the light &#8212; used once
     per plate and never on the ambient field. Image cards only, no explanations: the
     presenter's material stays off the public site (C-19). Cards carry identity labels
     &#8212; a name, a year, a count &#8212; never the argument.

     THE CANVAS.  viewBox 0 0 1120 630 on every drawn surface, 16:9. .deck is 76rem wide
     with a 3rem inline pad, so the stage renders at exactly 1120px at design width and
     one viewBox unit is one CSS pixel.

     THE GRID.  Margins left/right 64, top 48, bottom 64. Live area 992 x 518.
     Four fixed bands on every surface:
       Register  48-90    the mono factual head line, uppercase, baseline 78
       Title     90-160   the plate title, serif, sentence case, baseline 140
       Stage    160-552   the drawing; nothing else enters it
       Foot     552-590   source qualifier and the dimension badge, baseline 580
     Everything left-aligns to x=64. One hairline at y=100 gives every plate a shoulder.

     THE TYPE.  Five sizes, no others: Datum 96 serif / Title 44 serif / Label 26 mono /
     Register 24 mono UPPERCASE / Note 22 mono. Uppercase is confined to Register.

     THE STROKES.  Three weights at 1 : 2.5 : 6 &#8212; hair 1.5 (ambient), draw 4
     (subject), bear 10 (structural, at most two per plate). Gold is only ever bear
     weight or a filled mark 14 units or more across; gold hairlines are forbidden.

     THE TONES.  Five, no others: ground #081a35, plate #0b2140, trace paper@.14,
     ambient mute@.55 (3.83:1 as a mark), subject paper (13.90:1), accent gold (7.57:1).
     Ambient tone is for unlit MARKS only &#8212; every drawn letterform sits at subject
     paper or at mute full opacity (9.09:1 on the plate), so no text rides the .55 tone.

     No animation, no transitions, no webfonts, no network request of any kind. Every
     mark is drawn inline here; prefers-reduced-motion is honoured by construction. */
  :root {
    --deep:#081a35; --plate:#0b2140; --paper:#f4efe2; --gold:#dfa93f; --mute:#b9c3d6;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,"Book Antiqua",Georgia,serif;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
    --datum:96px; --ttl:44px; --label:26px; --reg:24px; --note:22px;
  }
  *,*::before,*::after { box-sizing:border-box; }
  html,body { margin:0; padding:0; height:100%; background:var(--deep); color:var(--paper); }
  body { font-family:var(--serif); display:flex; flex-direction:column; min-height:100vh; }
  .deck { flex:1; display:flex; flex-direction:column; max-width:76rem; width:100%;
          margin-inline:auto; padding:1rem 3rem 0; }
  .stage { position:relative; flex:1; display:flex; align-items:center; justify-content:center; }
  svg { display:block; width:100%; height:auto; max-height:72vh; }

  /* ---- the five type roles ---- */
  .p-d { font-family:var(--serif); font-size:var(--datum); fill:var(--paper); }
  .p-t { font-family:var(--serif); font-size:var(--ttl);   fill:var(--paper); }
  .p-l { font-family:var(--mono);  font-size:var(--label); fill:var(--paper); }
  .p-r { font-family:var(--mono);  font-size:var(--reg);   fill:var(--mute); letter-spacing:.16em; }
  .p-n { font-family:var(--mono);  font-size:var(--note);  fill:var(--mute); letter-spacing:.04em; }
  .it  { font-style:italic; }
  /* tone modifiers for letterforms, declared after the roles so they win the cascade */
  .tg { fill:var(--gold); }
  .tp { fill:var(--paper); }
  .tm { fill:var(--mute); }

  /* ---- three stroke weights, five tones ---- */
  .hair  { fill:none; stroke:var(--mute);  stroke-width:1.5; opacity:.55; }
  .trace { fill:none; stroke:var(--paper); stroke-width:1.5; opacity:.14; }
  .draw  { fill:none; stroke:var(--paper); stroke-width:4; stroke-linejoin:round; stroke-linecap:round; }
  .bear  { fill:none; stroke:var(--paper); stroke-width:10; }
  .bear-g{ fill:none; stroke:var(--gold);  stroke-width:10; }
  .fp { fill:var(--paper); stroke:none; }              /* subject fill */
  .fg { fill:var(--gold);  stroke:none; }              /* accent fill  */
  .fm { fill:var(--mute);  stroke:none; opacity:.55; } /* ambient fill */

  /* ---- the chart plane: ambient marks r=5, the lit mark gold at r=14 ---- */
  .pt circle.dot { fill:var(--mute); opacity:.55; r:5px; }
  .pt.on circle.dot { fill:var(--gold); opacity:1; r:14px; }
  .pt .plabel, .pt .ring, .pt .ptitle, .pt .pfoot { opacity:0; }
  .pt.on .plabel, .pt.on .ring, .pt.on .ptitle, .pt.on .pfoot { opacity:1; }
  /* the assembled card names no single place, so it spends no gold */
  .stage.assembled .pt.on circle.dot { fill:var(--paper); }
  .stage.assembled .pt .ptitle { opacity:0; }
  .alltitle { opacity:0; }
  .stage.assembled .alltitle { opacity:1; }

  /* ---- the title card and the drawn plates share the stage ---- */
  .title, .plate { position:absolute; inset:0; display:none;
                   align-items:center; justify-content:center; }
  .title.show, .plate.show { display:flex; }
  .stage.plated svg.chart { visibility:hidden; }

  /* ---- the caption: the plate draws its own Title, so the name is for the reader
         who cannot see it. It stays in the DOM for aria-live, visually hidden. ---- */
  .caption { min-height:2.4rem; text-align:center; padding:.5rem 0 .25rem; }
  .caption .cname { position:absolute; width:1px; height:1px; margin:-1px; padding:0;
                    overflow:hidden; clip-path:inset(50%); white-space:nowrap; border:0; }
  .caption .ctag { font-family:var(--mono); color:var(--mute); font-size:.9rem;
                   letter-spacing:.04em; display:block; }
  .caption.hidden { visibility:hidden; }

  /* ---- controls ---- */
  .bar { display:flex; align-items:center; justify-content:center; gap:1rem;
         padding:.75rem 0 1.25rem; font-family:var(--mono); flex-wrap:wrap; }
  button { font:inherit; font-family:var(--mono); font-size:1rem; color:var(--deep);
           background:var(--paper); border:0; padding:.4rem .9rem; cursor:pointer; }
  button:disabled { opacity:.35; cursor:default; }
  .dots { display:flex; gap:.5rem; flex-wrap:wrap; justify-content:center; }
  .dots button { padding:0; width:.85rem; height:.85rem; border-radius:50%;
                 background:transparent; border:1.5px solid var(--mute); }
  .dots button[aria-current="true"] { background:var(--gold); border-color:var(--gold); }
  .count { color:var(--mute); font-size:.85rem; min-width:4rem; text-align:center; }
  :focus-visible { outline:2px solid var(--gold); outline-offset:2px; }
  a { color:var(--gold); }
  .foot { text-align:center; font-family:var(--mono); font-size:.75rem; color:var(--mute);
          padding-bottom:1rem; }

  /* ---- 375px: the stage becomes a keyboard-walkable scroll box holding the plate at
         720px. 720/1120 = 0.64, so Label 26 renders at 16.6px and Note 22 at 14.1px,
         clearing the design record's 14px mono floor. The focus ring is drawn inside,
         Ledger's ratified graft, so an edge can never clip it. ---- */
  @media (max-width:760px) {
    .deck { padding:.75rem .75rem 0; }
    .stage { overflow-x:auto; overflow-y:hidden; justify-content:flex-start; }
    svg { width:720px; max-width:none; max-height:none; }
    .title, .plate { width:720px; right:auto; bottom:auto;
                     justify-content:flex-start; align-items:flex-start; }
    :focus-visible { outline-offset:-2px; }
  }

/* Print: a deck is a card viewer, so printing it naively emits one page showing whichever
   card is current. These rules unstack the cards and break a page between them. The first
   attempt named only .plane and missed .plate entirely &#8212; two of the five decks use the
   other name &#8212; and it left the stage clipping its overflow, so even the decks it did
   match collapsed to two pages. Screen behaviour is untouched. */
@media print {
  .dots, .nav, button, .foot { display: none !important; }
  html, body { background: #081a35 !important; height: auto !important;
    -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .deck, .stage { height: auto !important; min-height: 0 !important; max-height: none !important;
    overflow: visible !important; display: block !important; position: static !important; }
  .plane, .plate, .title {
    display: block !important; visibility: visible !important; position: static !important;
    opacity: 1 !important; height: auto !important; max-height: none !important; width: auto !important;
    overflow: visible !important; page-break-after: always; break-after: page;
    margin: 0 0 4mm; inset: auto !important; }
  .plane svg, .plate svg, .title svg, .stage > svg {
    width: 100% !important; height: auto !important; max-height: 165mm; display: block; }
  .stage > svg { page-break-after: always; break-after: page; }
  /* the chart is hidden on screen while a plate is up; print needs it back */
  .stage.plated svg.chart { visibility: visible !important; }
  .cap, .caption { display: block !important; visibility: visible !important; }
}
</style>
</head>
<body>
<div class="deck">
  <div class="stage" id="stage" tabindex="0" role="group" aria-roledescription="slide deck"
       aria-label="Four Odysseys, an audience deck. Use the left and right arrow keys.">
    <!-- ============ THE PLANE: one surface, five cards light it ============ -->
    <svg class="chart" viewBox="0 0 1120 630" role="img" aria-labelledby="ch-t ch-d">
      <title id="ch-t">The plane: fidelity against interior orientation</title>
      <desc id="ch-d">A scatter plot on a deep plate. The horizontal axis is fidelity to Homer&#8217;s plot and genre, from about zero per cent at the left to one hundred per cent at the right. The vertical axis is interior orientation, running from externalized at the foot through medium-high and high to maximal at the head. Four marks sit on it. Homer, at one hundred per cent fidelity and externalized interiority, low at the right. Wilson, 2017, at one hundred per cent fidelity and high interiority, directly above Homer. Nolan, 2026, at about seventy per cent fidelity and medium-high interiority, in the middle, inside a broken ring that marks a placement resting on reports rather than on the work. Joyce, 1922, at about zero per cent fidelity and maximal interiority, high at the left. One mark is lit at a time; the last card lights all four.</desc>
      <rect x="32" y="24" width="1056" height="582" fill="#0b2140"/>
      <text class="p-r" x="64" y="78">FIDELITY TO HOMER&#8217;S PLOT AND GENRE &#8594;</text>
      <line class="hair" x1="64" y1="100" x2="1056" y2="100"/>

      <!-- the plate title band carries the lit work's name -->
      <text class="alltitle p-t" x="64" y="140">The four, assembled</text>

      <!-- the room: axes, gridlines, band names -->
      <text class="p-r" x="240" y="178">INTERIOR ORIENTATION &#8593;</text>
      <line class="hair" x1="240" y1="196" x2="240" y2="500"/>
      <line class="hair" x1="240" y1="500" x2="1010" y2="500"/>
      <g class="trace">
        <line x1="240" y1="210" x2="1010" y2="210"/>
        <line x1="240" y1="305" x2="1010" y2="305"/>
        <line x1="240" y1="380" x2="1010" y2="380"/>
        <line x1="240" y1="470" x2="1010" y2="470"/>
      </g>
      <g class="p-n">
        <text x="64" y="218">maximal</text>
        <text x="64" y="313">high</text>
        <text x="64" y="388">medium-high</text>
        <text x="64" y="478">externalized</text>
      </g>
      <g class="p-n" text-anchor="middle">
        <text x="240" y="534">0%</text>
        <text x="625" y="534">50%</text>
        <text x="1010" y="534">100%</text>
      </g>

      <!-- the four marks. Unlit: ambient, r=5, no label. Lit: gold, r=14, one Label. -->
      <g class="pt" id="p-homer">
        <text class="ptitle p-t" x="64" y="140">Homer</text>
        <circle class="dot" cx="1010" cy="470" r="5"/>
        <text class="plabel p-l" x="986" y="455" text-anchor="end">the source &#183; oral epic &#183; 100%</text>
      </g>
      <g class="pt" id="p-wilson">
        <text class="ptitle p-t" x="64" y="140">Wilson, 2017</text>
        <circle class="dot" cx="1010" cy="305" r="5"/>
        <text class="plabel p-l" x="986" y="290" text-anchor="end">register, not plot &#183; 100%</text>
      </g>
      <g class="pt" id="p-nolan">
        <text class="ptitle p-t" x="64" y="140">Nolan, 2026</text>
        <circle class="ring" cx="779" cy="380" r="30" fill="none" stroke="#f4efe2"
                stroke-width="4" stroke-dasharray="10 8"/>
        <circle class="dot" cx="779" cy="380" r="5"/>
        <text class="plabel p-l" x="779" y="330" text-anchor="middle">adds content &#183; ~70%</text>
        <text class="pfoot p-n" x="64" y="580">From reports, not the film.</text>
      </g>
      <g class="pt" id="p-joyce">
        <text class="ptitle p-t" x="64" y="140">Joyce, 1922</text>
        <circle class="dot" cx="250" cy="210" r="5"/>
        <text class="plabel p-l" x="276" y="219">genre transformed &#183; ~0%</text>
      </g>

      <text class="p-n" x="1056" y="580" text-anchor="end">16 &#183; FOUR ODYSSEYS</text>
    </svg>

    <!-- ============ THE TITLE CARD ============ -->
    <div class="title show" id="title">
      <svg viewBox="0 0 1120 630" role="img" aria-labelledby="ti-t ti-d">
        <title id="ti-t">Four Odysseys</title>
        <desc id="ti-d">The deck&#8217;s title card. On a deep plate, the words Four Odysseys are set large at the left over a heavy gold rule. Beneath the rule the four works are named in a line: Homer, Wilson, Nolan, Joyce. Below that, in italic: two axes usually collapsed into one.</desc>
        <rect x="32" y="24" width="1056" height="582" fill="#0b2140"/>
        <text class="p-r" x="64" y="78">AN AUDIENCE DECK &#183; DIMENSION 16</text>
        <line class="hair" x1="64" y1="100" x2="1056" y2="100"/>
        <text class="p-d" x="64" y="300">Four Odysseys</text>
        <line class="bear-g" x1="64" y1="338" x2="688" y2="338"/>
        <text class="p-r" x="64" y="400">HOMER &#183; WILSON &#183; NOLAN &#183; JOYCE</text>
        <text class="p-t it" x="64" y="474">Two axes usually collapsed into one.</text>
        <text class="p-n" x="1056" y="580" text-anchor="end">16 &#183; FOUR ODYSSEYS</text>
      </svg>
    </div>
    <!-- ============ HOMER ============ -->

    <!-- PAIR: a wreath and a lit threshold, drawn at the same size -->
    <div class="plate" id="pl-measures">
      <svg viewBox="0 0 1120 630" role="img" aria-labelledby="pm-t pm-d">
        <title id="pm-t">kleos and xenia</title>
        <desc id="pm-d">Two drawings side by side on a deep plate, divided by a faint vertical rule. On the left, a laurel wreath in outline, labelled fame. On the right, a round-headed doorway in outline standing on a heavy gold threshold, labelled guest-law.</desc>
        <rect x="32" y="24" width="1056" height="582" fill="#0b2140"/>
        <text class="p-r" x="64" y="78">HOMER &#183; THE POEM&#8217;S VALUE SYSTEM</text>
        <line class="hair" x1="64" y1="100" x2="1056" y2="100"/>
        <text class="p-t" x="64" y="140">kleos &#183; xenia</text>

        <line class="hair" x1="560" y1="190" x2="560" y2="520"/>

        <!-- kleos: the wreath -->
        <g class="draw">
          <path d="M 287 211.7 A 110 110 0 0 0 287 428.3"/>
          <path d="M 325 211.7 A 110 110 0 0 1 325 428.3"/>
          <path d="M 287 211.7 L 283 189.4 M 232.4 238.2 L 217.3 221.4 M 200.2 289.7 L 178.5 283.5 M 200.2 350.3 L 178.5 356.5 M 232.4 401.8 L 217.3 418.6 M 287 428.3 L 283 450.6"/>
          <path d="M 325 211.7 L 329 189.4 M 379.6 238.2 L 394.7 221.4 M 411.8 289.7 L 433.5 283.5 M 411.8 350.3 L 433.5 356.5 M 379.6 401.8 L 394.7 418.6 M 325 428.3 L 329 450.6"/>
        </g>
        <text class="p-l" x="306" y="500" text-anchor="middle">fame</text>

        <!-- xenia: the doorway on its lit threshold -->
        <path class="draw" d="M 734 430 L 734 280 A 80 80 0 0 1 894 280 L 894 430"/>
        <line class="bear-g" x1="706" y1="430" x2="922" y2="430"/>
        <text class="p-l" x="814" y="500" text-anchor="middle">guest-law</text>

        <text class="p-n" x="64" y="580">The measures a hero is judged by.</text>
        <text class="p-n" x="1056" y="580" text-anchor="end">16 &#183; FOUR ODYSSEYS</text>
      </svg>
    </div>

    <!-- SERIES: six roles standing on one gold baseline -->
    <div class="plate" id="pl-complete">
      <svg viewBox="0 0 1120 630" role="img" aria-labelledby="pc-t pc-d">
        <title id="pc-t">A complete man</title>
        <desc id="pc-d">Six identical standing figures in silhouette, evenly spaced in a row across a deep plate, all resting on one heavy gold rule. Each is labelled beneath: son, father, husband, lover, soldier, king.</desc>
        <rect x="32" y="24" width="1056" height="582" fill="#0b2140"/>
        <text class="p-r" x="64" y="78">JOYCE, TO BUDGEN, ON ODYSSEUS</text>
        <line class="hair" x1="64" y1="100" x2="1056" y2="100"/>
        <text class="p-t" x="64" y="140">&#8220;A complete man&#8221;</text>

        <g class="fp">
          <circle cx="147" cy="280" r="26"/><path d="M 114 460 L 121 313 Q 147 286 173 313 L 180 460 Z"/>
          <circle cx="312" cy="280" r="26"/><path d="M 279 460 L 286 313 Q 312 286 338 313 L 345 460 Z"/>
          <circle cx="477" cy="280" r="26"/><path d="M 444 460 L 451 313 Q 477 286 503 313 L 510 460 Z"/>
          <circle cx="643" cy="280" r="26"/><path d="M 610 460 L 617 313 Q 643 286 669 313 L 676 460 Z"/>
          <circle cx="808" cy="280" r="26"/><path d="M 775 460 L 782 313 Q 808 286 834 313 L 841 460 Z"/>
          <circle cx="973" cy="280" r="26"/><path d="M 940 460 L 947 313 Q 973 286 999 313 L 1006 460 Z"/>
        </g>
        <line class="bear-g" x1="64" y1="460" x2="1056" y2="460"/>
        <g class="p-l" text-anchor="middle">
          <text x="147" y="506">son</text>
          <text x="312" y="506">father</text>
          <text x="477" y="506">husband</text>
          <text x="643" y="506">lover</text>
          <text x="808" y="506">soldier</text>
          <text x="973" y="506">king</text>
        </g>

        <text class="p-n" x="64" y="580">The figure Joyce chose.</text>
        <text class="p-n" x="1056" y="580" text-anchor="end">16 &#183; FOUR ODYSSEYS</text>
      </svg>
    </div>
    <!-- ============ WILSON, 2017 ============ -->

    <!-- PAIR: one epithet, two renderings, drawn at the same size -->
    <div class="plate" id="pl-polytropos">
      <svg viewBox="0 0 1120 630" role="img" aria-labelledby="pp-t pp-d">
        <title id="pp-t">polytropos</title>
        <desc id="pp-d">Two framed panels side by side on a deep plate, divided by a faint vertical rule. The left panel, drawn in a faint outline, holds the words &#8220;of many wiles&#8221; in muted type, labelled older translations. The right panel, drawn in a firm outline, holds the word &#8220;complicated&#8221; in gold, labelled Wilson, 2017.</desc>
        <rect x="32" y="24" width="1056" height="582" fill="#0b2140"/>
        <text class="p-r" x="64" y="78">ODYSSEUS&#8217;S OPENING EPITHET</text>
        <line class="hair" x1="64" y1="100" x2="1056" y2="100"/>
        <text class="p-t it" x="64" y="140">polytropos</text>

        <line class="hair" x1="560" y1="190" x2="560" y2="520"/>

        <rect class="hair" x="112" y="290" width="388" height="120"/>
        <text class="p-t tm" x="306" y="366" text-anchor="middle">of many wiles</text>
        <text class="p-l" x="306" y="470" text-anchor="middle">Older translations</text>

        <rect class="draw" x="620" y="290" width="388" height="120"/>
        <text class="p-t tg" x="814" y="366" text-anchor="middle">complicated</text>
        <text class="p-l" x="814" y="470" text-anchor="middle">Wilson, 2017</text>

        <text class="p-n" x="64" y="580">One epithet, two renderings.</text>
        <text class="p-n" x="1056" y="580" text-anchor="end">16 &#183; FOUR ODYSSEYS</text>
      </svg>
    </div>

    <!-- SERIES: five feet on one gold baseline -->
    <div class="plate" id="pl-line">
      <svg viewBox="0 0 1120 630" role="img" aria-labelledby="pl-t pl-d">
        <title id="pl-t">The line</title>
        <desc id="pl-d">Five identical metrical feet in a row across a deep plate. Each foot is a small muted circle followed by a tall pale bar &#8212; one light syllable, one stressed &#8212; and each is bracketed beneath. All five rest on one heavy gold rule, labelled: regular, her word.</desc>
        <rect x="32" y="24" width="1056" height="582" fill="#0b2140"/>
        <text class="p-r" x="64" y="78">WILSON, 2017 &#183; UNRHYMED IAMBIC PENTAMETER</text>
        <line class="hair" x1="64" y1="100" x2="1056" y2="100"/>
        <text class="p-t" x="64" y="140">The line</text>

        <g class="fm">
          <circle cx="115" cy="330" r="14"/><circle cx="314" cy="330" r="14"/>
          <circle cx="512" cy="330" r="14"/><circle cx="710" cy="330" r="14"/>
          <circle cx="909" cy="330" r="14"/>
        </g>
        <g class="fp">
          <rect x="183" y="286" width="18" height="88"/><rect x="382" y="286" width="18" height="88"/>
          <rect x="580" y="286" width="18" height="88"/><rect x="778" y="286" width="18" height="88"/>
          <rect x="977" y="286" width="18" height="88"/>
        </g>
        <g class="hair">
          <path d="M 73 400 L 73 418 L 253 418 L 253 400"/>
          <path d="M 272 400 L 272 418 L 452 418 L 452 400"/>
          <path d="M 470 400 L 470 418 L 650 418 L 650 400"/>
          <path d="M 668 400 L 668 418 L 848 418 L 848 400"/>
          <path d="M 867 400 L 867 418 L 1047 418 L 1047 400"/>
        </g>
        <line class="bear-g" x1="73" y1="446" x2="1047" y2="446"/>
        <text class="p-l" x="560" y="500" text-anchor="middle">regular &#8212; her word</text>

        <text class="p-n" x="64" y="580">&#8220;Regular&#8221; is her own word.</text>
        <text class="p-n" x="1056" y="580" text-anchor="end">16 &#183; FOUR ODYSSEYS</text>
      </svg>
    </div>

    <!-- PAIR: two equal stacks, and the gold sign between them -->
    <div class="plate" id="pl-lines">
      <svg viewBox="0 0 1120 630" role="img" aria-labelledby="pq-t pq-d">
        <title id="pq-t">The same number of lines</title>

  CARDS.forEach(function(c, n){
    var d = document.createElement("button");
    d.setAttribute("aria-label","Card " + (n+1) + (c.name ? ": " + c.name : ""));
    d.addEventListener("click", function(){ go(n); });
    dotsWrap.appendChild(d);
  });
  var dots = dotsWrap.querySelectorAll("button");

  function render(){
    var c = CARDS[i];
    pts.forEach(function(id){
      var el = document.getElementById(id);
      var on = (c.kind === "all") || (c.kind === "work" && c.id === id);
      el.classList.toggle("on", on);
    });
    plates.forEach(function(el){
      el.classList.toggle("show", c.kind === "plate" && el.id === c.plate);
    });
    stage.classList.toggle("plated", c.kind === "plate");
    stage.classList.toggle("assembled", c.kind === "all");
    title.classList.toggle("show", c.kind === "title");
    if (c.kind === "title") {
      caption.classList.add("hidden");
    } else {
      caption.classList.remove("hidden");
      capName.textContent = c.name;
      capTag.textContent = c.tag;
    }
    prev.disabled = (i === 0);
    next.disabled = (i === CARDS.length - 1);
    count.textContent = (i+1) + " / " + CARDS.length;
    dots.forEach(function(d, n){ d.setAttribute("aria-current", n === i ? "true" : "false"); });
  }
  function go(n){ i = Math.max(0, Math.min(CARDS.length - 1, n)); render(); }

  prev.addEventListener("click", function(){ go(i-1); });
  next.addEventListener("click", function(){ go(i+1); });
  document.addEventListener("keydown", function(e){
    if (e.altKey || e.ctrlKey || e.metaKey) { return; }
    if (e.key === "ArrowRight" || e.key === "PageDown") { go(i+1); e.preventDefault(); }
    else if (e.key === "ArrowLeft" || e.key === "PageUp") { go(i-1); e.preventDefault(); }
    else if (e.key === "Home") { go(0); e.preventDefault(); }
    else if (e.key === "End") { go(CARDS.length-1); e.preventDefault(); }
  });
  render();
})();
</script>
</body>
</html>
